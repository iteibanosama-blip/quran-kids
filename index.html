<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐎 مغامرة العاديات | Aventura Al-Adiyat</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Baloo+Bhaijaan+2:wght@400;600;800&family=Lilita+One&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700;
  --gold-dark: #DAA520;
  --gold-light: #FFF3CD;
  --teal: #00D9A6;
  --teal-dark: #00B88C;
  --sky: #64CFFF;
  --purple: #A855F7;
  --purple-dark: #7C3AED;
  --green: #34D399;
  --red: #F87171;
  --orange: #FB923C;
  --pink: #F472B6;
  --bg: #0A0E27;
  --bg2: #111640;
  --bg3: #1A1F52;
  --card: #161B4A;
  --card2: #1E2460;
  --text: #E8EAFF;
  --dim: #7B83B5;
  --xp-bar: linear-gradient(90deg, #A855F7, #EC4899, #F59E0B);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Fredoka', 'Baloo Bhaijaan 2', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* === ANIMATED DESERT SKY BACKGROUND === */
.sky-bg {
  position: fixed; top:0; left:0; right:0; bottom:0; z-index:0; pointer-events:none;
  background: linear-gradient(180deg, #0A0E27 0%, #1A1040 40%, #2D1B69 70%, #1A1040 100%);
}
.sky-bg .stars {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background-image:
    radial-gradient(2px 2px at 10% 15%, #fff 0%, transparent 100%),
    radial-gradient(2px 2px at 25% 35%, #FFD700 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 10%, #fff 0%, transparent 100%),
    radial-gradient(2px 2px at 55% 45%, #fff 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 20%, #FFD700 0%, transparent 100%),
    radial-gradient(2px 2px at 85% 30%, #fff 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 60%, #fff 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 55%, #FFD700 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 10%, #fff 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 70%, #fff 0%, transparent 100%),
    radial-gradient(2px 2px at 80% 65%, #fff 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 80%, #FFD700 0%, transparent 100%);
  animation: twinkle 3s ease-in-out infinite alternate;
}
@keyframes twinkle { 0%{opacity:.4} 100%{opacity:.8} }

/* === PARTICLES CANVAS === */
#particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }

/* === MAIN APP === */
.app { position:relative; z-index:2; max-width:480px; margin:0 auto; padding:12px; padding-bottom:110px; }

/* === HORSE MASCOT === */
.mascot-area {
  text-align:center; padding:8px 0; position:relative;
}
.horse-container {
  position:relative; display:inline-block;
  animation: horseFloat 3s ease-in-out infinite;
}
@keyframes horseFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.horse-emoji {
  font-size: 64px;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
  transition: all 0.5s;
}
.horse-container.gallop .horse-emoji { animation: gallop 0.3s ease-in-out 3; }
@keyframes gallop { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-10deg) scale(1.1)} }
.horse-level-badge {
  position:absolute; bottom:-4px; right:-8px;
  background: var(--xp-bar); color:#fff;
  font-size:11px; font-weight:700;
  padding:2px 8px; border-radius:10px;
  box-shadow: 0 2px 8px rgba(168,85,247,0.5);
}
.horse-name {
  font-family:'Lilita One',sans-serif;
  font-size:18px; color:var(--gold);
  margin-top:4px; letter-spacing:0.5px;
  text-shadow: 0 0 15px rgba(255,215,0,0.3);
}
.horse-mood {
  font-size:12px; color:var(--dim);
  margin-top:2px;
}
.horse-accessories {
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none; font-size:20px;
}
.accessory { position:absolute; transition:all 0.5s; }

/* === XP / LEVEL BAR === */
.xp-section {
  background: var(--card); border-radius:16px;
  padding:12px 16px; margin:8px 0;
  border:1px solid rgba(255,255,255,0.05);
}
.xp-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.xp-level { font-family:'Lilita One',sans-serif; font-size:14px; color:var(--purple); }
.xp-coins { display:flex; align-items:center; gap:4px; font-size:13px; color:var(--gold); font-weight:600; }
.xp-track { height:10px; background:rgba(255,255,255,0.08); border-radius:8px; overflow:hidden; position:relative; }
.xp-fill { height:100%; background:var(--xp-bar); border-radius:8px; transition:width 0.8s cubic-bezier(.4,0,.2,1); position:relative; }
.xp-fill::after { content:''; position:absolute; top:0;right:0;bottom:0;width:40px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4)); border-radius:8px; animation:xpShine 2s infinite; }
@keyframes xpShine { 0%{opacity:0} 50%{opacity:1} 100%{opacity:0} }
.xp-text { font-size:11px; color:var(--dim); margin-top:4px; text-align:center; }
.streak-badge { display:inline-flex; align-items:center; gap:4px; background:linear-gradient(135deg,#F59E0B,#EF4444); padding:3px 10px; border-radius:10px; font-size:12px; font-weight:700; color:#fff; }

/* === COIN POPUP === */
.coin-popup {
  position:fixed; z-index:200; pointer-events:none;
  font-size:18px; font-weight:700; color:var(--gold);
  text-shadow:0 0 10px rgba(255,215,0,0.5);
  animation: coinUp 1.2s ease-out forwards;
}
@keyframes coinUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(1.5)} }

/* === TABS === */
.lang-row { display:flex; justify-content:center; gap:6px; margin:8px 0; }
.lang-btn { padding:6px 18px; border-radius:16px; border:2px solid rgba(255,255,255,0.08); background:transparent; color:var(--dim); font-family:'Fredoka'; font-size:13px; cursor:pointer; transition:all .3s; }
.lang-btn.active { background:var(--teal); color:#fff; border-color:var(--teal); }

.tabs { display:flex; gap:5px; margin:10px 0; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar{display:none}
.tab-btn { flex-shrink:0; padding:9px 14px; border-radius:12px; border:none; background:var(--card); color:var(--dim); font-family:'Fredoka'; font-size:12px; cursor:pointer; transition:all .3s; display:flex; align-items:center; gap:5px; white-space:nowrap; }
.tab-btn.active { background:var(--purple); color:#fff; box-shadow:0 4px 15px rgba(168,85,247,.3); }

.section { display:none; animation:fadeSlide .4s ease; }
.section.active { display:block; }
@keyframes fadeSlide { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* === AYAH CARDS === */
.ayah-card {
  background:var(--card); border-radius:18px; padding:16px; margin-bottom:10px;
  border:2px solid transparent; transition:all .3s; position:relative; overflow:hidden;
}
.ayah-card.playing { border-color:var(--teal); box-shadow:0 0 25px rgba(0,217,166,.15); }
.ayah-card.mastered { border-color:var(--green); }
.ayah-card.mastered::after { content:'\u2713'; position:absolute; top:8px; left:8px; width:22px; height:22px; background:var(--green); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
.ayah-num { display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; background:linear-gradient(135deg,var(--gold),var(--orange)); color:#fff; border-radius:50%; font-weight:700; font-size:13px; margin-bottom:8px; }

/* KARAOKE TEXT */
.ayah-arabic {
  font-family:'Amiri',serif; font-size:26px; line-height:2;
  color:rgba(255,243,205,.6); text-align:right; direction:rtl; margin-bottom:8px;
  transition:color .3s;
}
.ayah-arabic .word {
  display:inline; transition: color 0.2s, text-shadow 0.2s;
  cursor:pointer; padding:0 2px;
}
.ayah-arabic .word.active {
  color:var(--gold) !important;
  text-shadow: 0 0 15px rgba(255,215,0,0.6), 0 0 30px rgba(255,215,0,0.3);
}
.ayah-arabic .word.done { color:var(--gold-light); }
.ayah-translit { font-size:13px; color:var(--sky); margin-bottom:4px; direction:ltr; text-align:left; font-style:italic; }
.ayah-meaning { font-size:13px; color:var(--dim); line-height:1.5; }
.ayah-meaning.lang-es { direction:ltr; text-align:left; }
.ayah-meaning.lang-ar { direction:rtl; text-align:right; font-family:'Baloo Bhaijaan 2'; }

.ayah-btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.abtn { padding:7px 12px; border-radius:10px; border:none; font-family:'Fredoka'; font-size:11px; cursor:pointer; display:flex; align-items:center; gap:4px; color:#fff; transition:all .2s; }
.abtn:active { transform:scale(.93); }
.abtn-play { background:var(--teal); }
.abtn-karaoke { background:linear-gradient(135deg,var(--purple),var(--pink)); }
.abtn-slow { background:var(--purple-dark); }
.abtn-repeat { background:var(--orange); }
.abtn-master { background:var(--green); }
.abtn-master.done { background:rgba(52,211,153,.3); }

/* === RECITER === */
.reciter-row { display:flex; gap:5px; margin-bottom:10px; justify-content:center; flex-wrap:wrap; }
.rec-btn { padding:5px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.08); background:transparent; color:var(--dim); font-family:'Fredoka'; font-size:11px; cursor:pointer; transition:all .3s; }
.rec-btn.active { background:var(--gold-dark); color:#fff; border-color:var(--gold-dark); }

/* === ADVENTURE MODE === */
.adventure-map {
  position:relative; padding:20px 0; overflow:hidden;
}
.desert-path {
  display:flex; flex-direction:column; align-items:center; gap:0;
  position:relative;
}
.path-segment {
  display:flex; align-items:center; gap:12px;
  position:relative; z-index:2;
}
.path-segment:nth-child(odd) { flex-direction:row; }
.path-segment:nth-child(even) { flex-direction:row-reverse; }
.path-line {
  width:3px; height:40px; background:rgba(255,255,255,.08);
  margin:0 auto; position:relative; z-index:1;
}
.path-line.completed { background:linear-gradient(180deg,var(--gold),var(--teal)); box-shadow:0 0 8px rgba(255,215,0,.3); }

.adventure-stop {
  width:64px; height:64px; border-radius:50%;
  background:var(--card2); border:3px solid rgba(255,255,255,.1);
  display:flex; align-items:center; justify-content:center;
  font-size:28px; cursor:pointer; transition:all .3s;
  position:relative;
}
.adventure-stop.locked { opacity:.4; cursor:not-allowed; filter:grayscale(1); }
.adventure-stop.current { border-color:var(--gold); box-shadow:0 0 20px rgba(255,215,0,.3); animation:stopPulse 2s infinite; }
@keyframes stopPulse { 0%,100%{box-shadow:0 0 20px rgba(255,215,0,.3)} 50%{box-shadow:0 0 35px rgba(255,215,0,.5)} }
.adventure-stop.completed { border-color:var(--green); background:rgba(52,211,153,.15); }
.adventure-stop-label {
  font-size:11px; color:var(--dim); text-align:center;
  max-width:80px; margin-top:4px;
}
.adventure-stop.current .adventure-stop-label { color:var(--gold); font-weight:600; }
.adventure-stop.completed .adventure-stop-label { color:var(--green); }

.stop-stars { display:flex; gap:2px; justify-content:center; margin-top:2px; }
.stop-star { font-size:10px; opacity:.3; }
.stop-star.earned { opacity:1; }

/* Adventure detail modal */
.adv-modal {
  display:none; position:fixed; top:0;left:0;right:0;bottom:0;
  background:rgba(10,14,39,.95); z-index:100;
  align-items:center; justify-content:center; padding:16px;
}
.adv-modal.show { display:flex; }
.adv-modal-content {
  background:var(--card); border-radius:20px; padding:24px; max-width:420px; width:100%;
  border:2px solid var(--gold-dark); position:relative; max-height:90vh; overflow-y:auto;
}
.adv-close { position:absolute; top:10px; right:14px; background:none; border:none; color:var(--dim); font-size:24px; cursor:pointer; }
.adv-modal-title { font-family:'Lilita One'; font-size:20px; color:var(--gold); text-align:center; margin-bottom:4px; }
.adv-modal-sub { font-size:13px; color:var(--dim); text-align:center; margin-bottom:16px; }
.adv-arabic { font-family:'Amiri',serif; font-size:28px; color:var(--gold-light); text-align:center; direction:rtl; line-height:1.8; margin-bottom:12px; }
.adv-steps { display:flex; flex-direction:column; gap:8px; margin:16px 0; }
.adv-step {
  display:flex; align-items:center; gap:10px;
  padding:12px; background:var(--bg2); border-radius:12px;
  border:2px solid transparent; cursor:pointer; transition:all .3s;
}
.adv-step.active { border-color:var(--teal); }
.adv-step.done { border-color:var(--green); opacity:.7; }
.adv-step-icon { font-size:24px; flex-shrink:0; }
.adv-step-text { font-size:13px; color:var(--text); line-height:1.4; }
.adv-step-reward { font-size:11px; color:var(--gold); margin-top:2px; }
.adv-complete-btn {
  display:block; width:100%; padding:14px; margin-top:12px;
  background:linear-gradient(135deg,var(--green),var(--teal));
  border:none; border-radius:14px; color:#fff;
  font-family:'Lilita One'; font-size:16px; cursor:pointer;
  transition:all .2s; box-shadow:0 4px 15px rgba(52,211,153,.3);
}
.adv-complete-btn:disabled { opacity:.3; cursor:not-allowed; }
.adv-complete-btn:active { transform:scale(.95); }

/* === UNDERSTAND === */
.tafsir-card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:12px; border:1px solid rgba(255,255,255,.05); }
.tafsir-ayah { font-family:'Amiri',serif; font-size:22px; color:var(--gold-light); text-align:right; margin-bottom:10px; line-height:1.7; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,.05); }
.tafsir-text { font-size:13px; line-height:1.7; color:var(--text); }
.tafsir-text.lang-es { direction:ltr; text-align:left; }
.tafsir-text.lang-ar { direction:rtl; text-align:right; font-family:'Baloo Bhaijaan 2'; }
.tafsir-text .keyword { color:var(--gold); font-weight:600; }
.tafsir-text .emoji-big { font-size:28px; display:block; text-align:center; margin:6px 0; }
.ai-btn { display:flex; align-items:center; gap:5px; margin-top:10px; padding:7px 12px; background:linear-gradient(135deg,var(--purple),#6C3AED); border:none; border-radius:10px; color:#fff; font-family:'Fredoka'; font-size:11px; cursor:pointer; }
.ai-box { display:none; margin-top:10px; }
.ai-box.show { display:block; animation:fadeSlide .3s; }
.ai-row { display:flex; gap:6px; }
.ai-input { flex:1; padding:9px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.1); background:var(--bg); color:var(--text); font-family:'Fredoka'; font-size:12px; outline:none; }
.ai-send { padding:9px 14px; border-radius:10px; border:none; background:var(--purple); color:#fff; font-size:14px; cursor:pointer; }
.ai-resp { margin-top:8px; padding:12px; background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.2); border-radius:10px; font-size:12px; line-height:1.6; display:none; }
.ai-resp.show { display:block; animation:fadeSlide .3s; }
.spinner { width:14px; height:14px; border:2px solid var(--teal); border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to{transform:rotate(360deg)} }

/* === QUIZ === */
.quiz-box { text-align:center; }
.quiz-info { font-size:12px; color:var(--dim); margin-bottom:8px; }
.quiz-type { display:inline-block; padding:3px 10px; border-radius:8px; background:rgba(168,85,247,.2); color:var(--purple); font-size:11px; margin-bottom:6px; font-weight:600; }
.quiz-q { color:var(--sky); font-size:14px; margin-bottom:4px; }
.quiz-prompt { font-family:'Amiri',serif; font-size:24px; color:var(--gold-light); padding:16px; margin:8px 0; background:var(--card); border-radius:14px; direction:rtl; min-height:60px; display:flex; align-items:center; justify-content:center; line-height:1.7; }
.quiz-opts { display:flex; flex-direction:column; gap:8px; margin:12px 0; }
.quiz-opt { padding:12px 16px; background:var(--card); border:2px solid rgba(255,255,255,.06); border-radius:12px; color:var(--text); font-size:15px; cursor:pointer; transition:all .3s; text-align:right; direction:rtl; font-family:'Amiri',serif; line-height:1.5; }
.quiz-opt.mean { font-family:'Fredoka'; font-size:13px; }
.quiz-opt.mean.lang-es { direction:ltr; text-align:left; }
.quiz-opt:hover { border-color:var(--teal); }
.quiz-opt.correct { border-color:var(--green)!important; background:rgba(52,211,153,.12)!important; }
.quiz-opt.wrong { border-color:var(--red)!important; background:rgba(248,113,113,.12)!important; animation:shake .4s; }
.quiz-opt.off { pointer-events:none; opacity:.5; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.quiz-fb { padding:12px; border-radius:10px; margin:10px 0; font-size:13px; font-weight:600; display:none; text-align:center; }
.quiz-fb.show { display:block; }
.quiz-fb.ok { background:rgba(52,211,153,.1); color:var(--green); }
.quiz-fb.no { background:rgba(248,113,113,.1); color:var(--red); }
.quiz-next { padding:10px 24px; border-radius:10px; border:none; background:var(--purple); color:#fff; font-family:'Fredoka'; font-size:13px; font-weight:600; cursor:pointer; }
.quiz-next:disabled { opacity:.3; }
.quiz-result { padding:20px; background:var(--card); border-radius:16px; border:2px solid var(--gold); margin:12px 0; }
.quiz-result h3 { color:var(--gold); font-size:18px; }
.quiz-result .big { font-size:44px; font-weight:800; color:var(--teal); margin:8px 0; }

/* === METHOD === */
.meth-card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:10px; }
.meth-step { display:flex; gap:12px; align-items:flex-start; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.meth-step:last-child { border:none; }
.meth-icon { flex-shrink:0; width:34px; height:34px; background:linear-gradient(135deg,var(--purple),var(--teal)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; }
.meth-body h4 { color:var(--gold); font-size:14px; margin-bottom:3px; }
.meth-body p { color:var(--dim); font-size:12px; line-height:1.5; }

/* === PLAY ALL BAR === */
.play-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(22,27,74,.95); border-top:1px solid rgba(255,255,255,.06); padding:10px 14px; display:flex; align-items:center; justify-content:center; gap:10px; z-index:50; backdrop-filter:blur(10px); }
.play-bar-btn { padding:9px 20px; border-radius:20px; border:none; background:linear-gradient(135deg,var(--teal),var(--teal-dark)); color:#fff; font-family:'Fredoka'; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; box-shadow:0 4px 12px rgba(0,217,166,.3); }
.play-bar-btn:active{transform:scale(.95)}
.play-bar-btn.stop { background:linear-gradient(135deg,var(--red),#DC2626); }
.rep-ctrl { display:flex; align-items:center; gap:5px; color:var(--dim); font-size:12px; }
.rep-ctrl button { width:26px; height:26px; border-radius:50%; border:1px solid rgba(255,255,255,.12); background:transparent; color:#fff; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* === CELEBRATION === */
.celeb { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(10,14,39,.96); z-index:200; display:none; align-items:center; justify-content:center; }
.celeb.show { display:flex; }
.celeb-inner { text-align:center; padding:24px; }
.celeb-icon { font-size:64px; animation:bounce 1s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.celeb h2 { font-family:'Lilita One'; font-size:26px; color:var(--gold); margin:12px 0 6px; }
.celeb p { color:var(--dim); font-size:14px; margin-bottom:16px; }
.celeb-close { padding:10px 24px; background:var(--teal); color:#fff; border:none; border-radius:12px; font-family:'Fredoka'; font-size:14px; font-weight:600; cursor:pointer; }

@media(max-width:380px){
  .ayah-arabic{font-size:22px} .horse-emoji{font-size:52px}
  .tab-btn{padding:7px 10px;font-size:11px}
}
</style>
</head>
<body>

<div class="sky-bg"><div class="stars"></div></div>
<canvas id="particles"></canvas>

<div class="app">
  <!-- MASCOT -->
  <div class="mascot-area">
    <div class="horse-container" id="horseBox">
      <div class="horse-emoji" id="horseEmoji">🐴</div>
      <div class="horse-level-badge" id="horseLvl">Nv.1</div>
    </div>
    <div class="horse-name" id="horseName">Buraq</div>
    <div class="horse-mood" id="horseMood">🌟 ¡Listo para aprender!</div>
  </div>

  <!-- XP BAR -->
  <div class="xp-section">

// =========== PARTICLES ===========
var canvas,ctx,particles=[];
function initParticles(){
  canvas=document.getElementById('particles');
  ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  requestAnimationFrame(drawParticles);
}
function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vy+=0.1;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    if(p.shape==='star'){drawStar(ctx,p.x,p.y,5,p.size,p.size/2);}
    else{ctx.arc(p.x,p.y,p.size,0,Math.PI*2);}
    ctx.fill();
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(drawParticles);
}
function drawStar(c,cx,cy,spikes,oR,iR){
  var rot=Math.PI/2*3,step=Math.PI/spikes;
  c.moveTo(cx,cy-oR);
  for(var i=0;i<spikes;i++){c.lineTo(cx+Math.cos(rot)*oR,cy+Math.sin(rot)*oR);rot+=step;c.lineTo(cx+Math.cos(rot)*iR,cy+Math.sin(rot)*iR);rot+=step;}
  c.closePath();
}
function burst(x,y,count,colors){
  for(var i=0;i<count;i++){
    particles.push({x:x,y:y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8-3,size:Math.random()*4+2,color:colors[Math.floor(Math.random()*colors.length)],life:1,decay:0.015+Math.random()*0.01,shape:Math.random()>.5?'star':'circle'});
  }
}
function rewardBurst(el){
  if(!el)return;var r=el.getBoundingClientRect();
  burst(r.left+r.width/2,r.top+r.height/2,25,['#FFD700','#FF6B6B','#A855F7','#34D399','#FB923C','#F472B6']);
}

// =========== KARAOKE ===========
function karaokePlay(num){
  var a=AYAT.find(function(x){return x.num===num});
  if(!a)return;
  stopAud();
  audio=new Audio(getUrl(num));
  playingAyah=num;
  var card=document.getElementById('ayah-'+num);
  if(card)card.classList.add('playing');

  // Reset all words
  a.words.forEach(function(_,i){
    var w=document.getElementById('w-'+num+'-'+i);
    if(w){w.classList.remove('active','done');}
  });

  audio.onplay=function(){
    // Estimate word timing based on duration
    audio.ontimeupdate=function(){
      if(!audio)return;
      var dur=audio.duration||3;
      var progress=audio.currentTime/dur;
      var totalWords=a.words.length;
      var currentWord=Math.floor(progress*totalWords);
      a.words.forEach(function(_,i){
        var w=document.getElementById('w-'+num+'-'+i);
        if(!w)return;
        if(i<currentWord){w.classList.remove('active');w.classList.add('done');}
        else if(i===currentWord){w.classList.add('active');w.classList.remove('done');}
        else{w.classList.remove('active','done');}
      });
    };
  };

  audio.onended=function(){
    playingAyah=null;
    if(card)card.classList.remove('playing');
    a.words.forEach(function(_,i){
      var w=document.getElementById('w-'+num+'-'+i);
      if(w){w.classList.remove('active');w.classList.add('done');}
    });
    addXP(15,card);
    gallopHorse();
    rewardBurst(card);
    // Mark as listened in adventure
    if(!advSteps[num])advSteps[num]={listened:false,understood:false,quizzed:false};
    advSteps[num].listened=true;save();
  };

  audio.onerror=function(){tryFallback(num,1,card);};
  audio.load();audio.play().catch(function(){});
}

// =========== AUDIO ===========
function playA(num,rate){
  if(!rate)rate=1;
  stopAud();
  audio=new Audio(getUrl(num));audio.playbackRate=rate;playingAyah=num;
  var card=document.getElementById('ayah-'+num);
  if(card)card.classList.add('playing');
  audio.onended=function(){playingAyah=null;if(card)card.classList.remove('playing');addXP(5,card);gallopHorse();if(!advSteps[num])advSteps[num]={listened:false,understood:false,quizzed:false};advSteps[num].listened=true;save();};
  audio.onerror=function(){tryFallback(num,rate,card);};
  audio.load();audio.play().catch(function(){});
}
function tryFallback(num,rate,card){
  var keys=Object.keys(RECS).filter(function(k){return k!==rec;});var i=0;
  function next(){if(i>=keys.length)return;var u=RECS[keys[i++]].url(num);if(audio){audio.pause();try{audio.src='';}catch(e){}}audio=new Audio(u);audio.playbackRate=rate||1;audio.onended=function(){playingAyah=null;if(card)card.classList.remove('playing');};audio.onerror=next;audio.load();audio.play().catch(next);}
  next();
}
function playRep(num){var c=0;function once(){if(c>=3)return;stopAud();audio=new Audio(getUrl(num));audio.playbackRate=.85;playingAyah=num;var card=document.getElementById('ayah-'+num);if(card)card.classList.add('playing');audio.onended=function(){c++;if(c<3)setTimeout(once,1000);else{playingAyah=null;if(card)card.classList.remove('playing');addXP(10,card);gallopHorse();}};audio.load();audio.play().catch(function(){});}once();}
function stopAud(){if(audio){audio.pause();try{audio.src='';}catch(e){}audio=null;}document.querySelectorAll('.ayah-card').forEach(function(c){c.classList.remove('playing')});playingAyah=null;}

    var done=steps.listened&&steps.understood&&steps.quizzed;
    var prevDone=idx===0?true:(function(){var prev=advSteps[AYAT[idx-1].num];return prev&&prev.listened&&prev.understood&&prev.quizzed;})();
    var isCurrent=!done&&prevDone;
    var isLocked=!prevDone&&!done;
    var cls=done?'completed':isCurrent?'current':'locked';
    var starsCount=(steps.listened?1:0)+(steps.understood?1:0)+(steps.quizzed?1:0);

    html+='<div class="path-segment"><div style="text-align:center;">'
      +'<div class="adventure-stop '+cls+'" onclick="'+(isLocked?'':'openAdvStop('+a.num+')')+'" data-num="'+a.num+'">'+a.icon+'</div>'

      +'<span class="stop-star '+(steps.quizzed?'earned':'')+'">⭐</span>'

  });

  html+='</div></div>';
  c.innerHTML=html;
}

function advListen(num){
  stopAud();

  audio.onended=function(){
    if(!advSteps[num])advSteps[num]={listened:false,understood:false,quizzed:false};
    if(!advSteps[num].listened){advSteps[num].listened=true;addXP(10);gallopHorse();}
    save();openAdvStop(num);renderAdventure();
  };
  audio.load();audio.play().catch(function(){});
}

function advUnderstand(num){
  var a=AYAT.find(function(x){return x.num===num});

}

function advQuiz(num){
  var a=AYAT.find(function(x){return x.num===num});
  var area=document.getElementById('advQuizArea');
  // Simple quiz: what does this ayah mean?
  var correct=a;
  var wrongs=shuffle(AYAT.filter(function(x){return x.num!==num})).slice(0,2);
  var opts=shuffle([correct].concat(wrongs));
  var correctIdx=opts.indexOf(correct);

  area.innerHTML='<div style="margin-top:16px;text-align:center;">'
    +'<div class="quiz-type">'+T('\u00BFQu\u00E9 significa?','\u0645\u0627 \u0627\u0644\u0645\u0639\u0646\u0649\u061F')+'</div>'

function advAnswer(num,sel,corr){

    document.getElementById('aq-'+sel).classList.add('correct');
    fb.className='quiz-fb show ok';fb.textContent=T('\u2705 \u00A1Correcto! \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647','\u2705 !\u0635\u062D\u064A\u062D! \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647');

      },800);

    document.getElementById('aq-'+sel).classList.add('wrong');

  }
}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function initQuiz(){
  quizQs=[];
  for(var i=0;i<AYAT.length-1;i++){var co=AYAT[i+1];var wr=shuffle(AYAT.filter(function(_,x){return x!==i+1})).slice(0,2);var ops=shuffle([co].concat(wr));quizQs.push({type:'next',q:T('\u00BFQu\u00E9 sigue?','\u0645\u0627 \u0627\u0644\u062A\u0627\u0644\u064A\u061F'),prompt:AYAT[i].ar,cNum:co.num,ops:ops.map(function(o){return{t:o.ar,n:o.num}})});}
  for(var i=0;i<AYAT.length;i++){var co=AYAT[i];var wr=shuffle(AYAT.filter(function(_,x){return x!==i})).slice(0,2);var ops=shuffle([co].concat(wr));quizQs.push({type:'mean',q:T('\u00BFQu\u00E9 significa?','\u0645\u0627 \u0627\u0644\u0645\u0639\u0646\u0649\u061F'),prompt:AYAT[i].ar,cNum:co.num,ops:ops.map(function(o){return{t:lang==='es'?o.es:o.arM,n:o.num}})});}
  quizQs=shuffle(quizQs).slice(0,8);qi=0;qScore=0;qDone=false;renderQ();
}
function renderQ(){
  var c=document.getElementById('quizBox');
  if(qi>=quizQs.length){var pct=Math.round(qScore/quizQs.length*100);
    c.innerHTML='<div class="quiz-result"><h3>'+T('\u00A1Resultado!','!\u0627\u0644\u0646\u062A\u064A\u062C\u0629')+'</h3><div class="big">'+pct+'%</div><p style="color:var(--dim)">'+qScore+'/'+quizQs.length+'</p><p style="color:var(--dim);margin-top:8px;font-size:13px">'+(pct>=80?T('\u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647!','\u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647!'):T('Sigue practicando!','\u0648\u0627\u0635\u0644!'))+'</p></div><button class="quiz-next" onclick="initQuiz()" style="margin-top:12px">\uD83D\uDD01 '+T('Otra vez','\u0645\u0631\u0629 \u0623\u062E\u0631\u0649')+'</button>';return;}
  var q=quizQs[qi];qDone=false;var isMean=q.type==='mean';
  c.innerHTML='<div class="quiz-info">'+T('Pregunta','\u0633\u0624\u0627\u0644')+' '+(qi+1)+'/'+quizQs.length+'</div>'
    +'<div class="quiz-type">'+(q.type==='next'?T('Completa','\u0623\u0643\u0645\u0644'):T('Significado','\u0627\u0644\u0645\u0639\u0646\u0649'))+'</div>'
    +'<div class="quiz-q">'+q.q+'</div>'
    +'<div class="quiz-prompt">'+q.prompt+'</div>'
    +'<div class="quiz-opts">'+q.ops.map(function(o,i){return'<button class="quiz-opt '+(isMean?'mean':'')+(isMean&&lang==='es'?' lang-es':'')+'" id="qo-'+i+'" onclick="qAns('+i+','+q.ops.map(function(x){return x.n}).indexOf(q.cNum)+')">'+o.t+'</button>'}).join('')+'</div>'
    +'<div class="quiz-fb" id="qFb"></div>'
    +'<button class="quiz-next" id="qNext" disabled onclick="qi++;renderQ()">'+T('Siguiente \u2192','\u2190 \u0627\u0644\u062A\u0627\u0644\u064A')+'</button>';
}
function qAns(s,c){
  if(qDone)return;qDone=true;var fb=document.getElementById('qFb');
  document.querySelectorAll('#quizBox .quiz-opt').forEach(function(o){o.classList.add('off')});
  document.getElementById('qo-'+c).classList.add('correct');
  if(s===c){qScore++;fb.className='quiz-fb show ok';fb.textContent=T('\u2705 \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647!','\u2705 !\u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647');addXP(15,document.getElementById('qo-'+s));rewardBurst(document.getElementById('qo-'+s));gallopHorse();}

  document.getElementById('qNext').disabled=false;
}

// =========== CELEBRATION ===========
function showCeleb(title,text,icon){
  document.getElementById('celebIcon').textContent=icon||'\uD83C\uDFC6';
  document.getElementById('celebTitle').textContent=title;
  document.getElementById('celebText').textContent=text;
  document.getElementById('celeb').classList.add('show');
  burst(window.innerWidth/2,window.innerHeight/2,60,['\u0023FFD700','\u0023FF6B6B','\u0023A855F7','\u002334D399','\u0023FB923C','\u0023F472B6','\u002364CFFF']);
}
function closeCeleb(){document.getElementById('celeb').classList.remove('show');}
