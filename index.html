<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>تعلم سورة العاديات | Aprende Sura Al-Adiyat</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Baloo+Bhaijaan+2:wght@400;600;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #F5B041;
  --gold-light: #FDEBD0;
  --teal: #1ABC9C;
  --teal-dark: #16A085;
  --sky: #85C1E9;
  --sky-light: #D6EAF8;
  --purple: #8E44AD;
  --purple-light: #D2B4DE;
  --green: #27AE60;
  --green-light: #ABEBC6;
  --red-soft: #E74C3C;
  --orange: #E67E22;
  --bg-main: #0B1929;
  --bg-card: #132743;
  --bg-card-hover: #1A3556;
  --text-light: #ECF0F1;
  --text-dim: #8899AA;
  --star-glow: #F9E79F;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Fredoka', 'Baloo Bhaijaan 2', sans-serif;
  background: var(--bg-main);
  color: var(--text-light);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(2px 2px at 20% 30%, var(--star-glow) 0%, transparent 100%),
    radial-gradient(2px 2px at 40% 70%, var(--star-glow) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 20%, var(--star-glow) 0%, transparent 100%),
    radial-gradient(2px 2px at 80% 50%, var(--star-glow) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 80%, var(--star-glow) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 90%, var(--star-glow) 0%, transparent 100%),
    radial-gradient(2px 2px at 50% 10%, var(--star-glow) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 40%, var(--star-glow) 0%, transparent 100%);
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
  animation: twinkle 4s ease-in-out infinite alternate;
}

@keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 0.6; } }

.app-container {
  position: relative;
  z-index: 1;
  max-width: 500px;
  margin: 0 auto;
  padding: 16px;
  padding-bottom: 100px;
}

.header { text-align: center; padding: 20px 0; }
.header-icon { font-size: 48px; animation: bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.header h1 { font-family: 'Amiri', serif; font-size: 28px; color: var(--gold); margin: 8px 0 4px; text-shadow: 0 0 20px rgba(245,176,65,0.3); }
.header h2 { font-family: 'Fredoka', sans-serif; font-size: 15px; color: var(--sky); font-weight: 500; direction: ltr; }

.progress-section { margin: 16px 0; background: var(--bg-card); border-radius: 16px; padding: 14px 18px; border: 1px solid rgba(255,255,255,0.05); }
.progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; color: var(--text-dim); }
.progress-label .level { color: var(--gold); font-weight: 600; }
.progress-bar-track { height: 12px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--gold)); border-radius: 10px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); position: relative; }
.progress-bar-fill::after { content: ''; position: absolute; top:0; right:0; bottom:0; width: 30px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3)); border-radius: 10px; }
.stars-earned { display: flex; gap: 4px; margin-top: 8px; justify-content: center; }
.star { font-size: 20px; opacity: 0.2; transition: all 0.4s; }
.star.earned { opacity: 1; animation: starPop 0.5s cubic-bezier(0.68,-0.55,0.265,1.55); filter: drop-shadow(0 0 6px var(--star-glow)); }
@keyframes starPop { 0% { transform: scale(0); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

.lang-toggle { display: flex; justify-content: center; gap: 8px; margin: 12px 0; }
.lang-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-dim); font-family: 'Fredoka', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.3s; }
.lang-btn.active { background: var(--teal); color: white; border-color: var(--teal); box-shadow: 0 4px 15px rgba(26,188,156,0.3); }

.tabs { display: flex; gap: 6px; margin: 16px 0; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 10px 16px; border-radius: 12px; border: none; background: var(--bg-card); color: var(--text-dim); font-family: 'Fredoka', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.3s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.tab-btn.active { background: var(--purple); color: white; box-shadow: 0 4px 15px rgba(142,68,173,0.3); }
.tab-btn .tab-icon { font-size: 16px; }

.section { display: none; animation: fadeIn 0.4s ease; }
.section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* AYAH CARDS */
.ayah-card { background: var(--bg-card); border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; position: relative; overflow: hidden; }
.ayah-card::before { content: ''; position: absolute; top:0; left:0; width: 4px; height: 100%; background: var(--teal); opacity: 0; transition: opacity 0.3s; }
.ayah-card.playing { border-color: var(--teal); box-shadow: 0 0 20px rgba(26,188,156,0.15); }
.ayah-card.playing::before { opacity: 1; }
.ayah-card.mastered { border-color: var(--green); }
.ayah-card.mastered .master-badge { display: flex; }
.master-badge { display: none; position: absolute; top: 10px; left: 10px; width: 24px; height: 24px; background: var(--green); color: white; border-radius: 50%; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
.ayah-number { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: linear-gradient(135deg, var(--gold), var(--orange)); color: white; border-radius: 50%; font-weight: 700; font-size: 14px; margin-bottom: 10px; }
.ayah-arabic { font-family: 'Amiri', serif; font-size: 26px; line-height: 1.8; color: var(--gold-light); text-align: right; direction: rtl; margin-bottom: 10px; }
.ayah-transliteration { font-size: 14px; color: var(--sky); margin-bottom: 6px; direction: ltr; text-align: left; font-style: italic; letter-spacing: 0.3px; }
.ayah-translation { font-size: 14px; color: var(--text-dim); line-height: 1.5; }
.ayah-translation.lang-es { direction: ltr; text-align: left; }
.ayah-translation.lang-ar { direction: rtl; text-align: right; font-family: 'Baloo Bhaijaan 2', sans-serif; }

.ayah-controls { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.ctrl-btn { padding: 8px 14px; border-radius: 10px; border: none; font-family: 'Fredoka', sans-serif; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; color: white; }
.ctrl-btn:active { transform: scale(0.95); }
.ctrl-btn:disabled { opacity: 0.5; cursor: wait; }
.btn-listen { background: var(--teal); }
.btn-slow { background: var(--purple); }
.btn-repeat { background: var(--orange); }
.btn-master { background: var(--green); }
.btn-master.done { background: rgba(39,174,96,0.4); }

/* AUDIO STATUS */
.audio-status { display: none; align-items: center; gap: 8px; margin-top: 10px; padding: 8px 12px; background: rgba(26,188,156,0.1); border-radius: 10px; font-size: 12px; color: var(--teal); }
.audio-status.show { display: flex; }
.audio-status .spinner { width: 16px; height: 16px; border: 2px solid var(--teal); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* UNDERSTAND / TAFSIR */
.tafsir-card { background: var(--bg-card); border-radius: 16px; padding: 18px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.05); }
.tafsir-card .tafsir-ayah { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold-light); text-align: right; margin-bottom: 12px; line-height: 1.7; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.tafsir-explain { font-size: 14px; line-height: 1.7; color: var(--text-light); }
.tafsir-explain.lang-es { direction: ltr; text-align: left; }
.tafsir-explain.lang-ar { direction: rtl; text-align: right; font-family: 'Baloo Bhaijaan 2', sans-serif; }
.tafsir-explain .emoji-big { font-size: 28px; display: block; text-align: center; margin: 8px 0; }
.tafsir-explain .keyword { color: var(--gold); font-weight: 600; }

/* AI EXPLAIN */
.ai-ask-btn { display: flex; align-items: center; gap: 6px; margin-top: 12px; padding: 8px 14px; background: linear-gradient(135deg, var(--purple), #6C3483); border: none; border-radius: 10px; color: white; font-family: 'Fredoka', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.ai-ask-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(142,68,173,0.4); }
.ai-ask-btn:disabled { opacity: 0.5; cursor: wait; }
.ai-response-box { margin-top: 12px; padding: 14px; background: rgba(142,68,173,0.1); border: 1px solid rgba(142,68,173,0.2); border-radius: 12px; font-size: 13px; line-height: 1.7; color: var(--text-light); display: none; }
.ai-response-box.show { display: block; animation: fadeIn 0.4s; }
.ai-input-row { display: flex; gap: 8px; margin-top: 10px; }
.ai-input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-main); color: var(--text-light); font-family: 'Fredoka', sans-serif; font-size: 13px; outline: none; }
.ai-input:focus { border-color: var(--purple); }
.ai-send-btn { padding: 10px 16px; border-radius: 10px; border: none; background: var(--purple); color: white; font-size: 16px; cursor: pointer; }

/* QUIZ */
.quiz-container { text-align: center; }
.quiz-header { color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
.quiz-type-label { display: inline-block; padding: 4px 12px; border-radius: 8px; background: rgba(142,68,173,0.2); color: var(--purple-light); font-size: 12px; margin-bottom: 8px; }
.quiz-prompt-text { color: var(--sky); font-size: 15px; margin-bottom: 4px; }
.quiz-prompt { font-family: 'Amiri', serif; font-size: 26px; color: var(--gold-light); padding: 20px; margin: 12px 0; background: var(--bg-card); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.8; direction: rtl; text-align: center; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
.quiz-option { padding: 14px 18px; background: var(--bg-card); border: 2px solid rgba(255,255,255,0.08); border-radius: 14px; color: var(--text-light); font-size: 16px; cursor: pointer; transition: all 0.3s; text-align: right; direction: rtl; line-height: 1.6; font-family: 'Amiri', serif; }
.quiz-option.meaning-opt { font-family: 'Fredoka', sans-serif; font-size: 14px; }
.quiz-option.meaning-opt.lang-es { direction: ltr; text-align: left; }
.quiz-option:hover { border-color: var(--teal); background: var(--bg-card-hover); }
.quiz-option.correct { border-color: var(--green) !important; background: rgba(39,174,96,0.15) !important; animation: correctPulse 0.5s; pointer-events: none; }
.quiz-option.wrong { border-color: var(--red-soft) !important; background: rgba(231,76,60,0.15) !important; animation: shake 0.4s; pointer-events: none; }
.quiz-option.disabled { pointer-events: none; opacity: 0.5; }
@keyframes correctPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
.quiz-feedback { padding: 14px; border-radius: 12px; margin: 12px 0; font-size: 14px; font-weight: 600; display: none; text-align: center; }
.quiz-feedback.show { display: block; animation: fadeIn 0.3s; }
.quiz-feedback.success { background: rgba(39,174,96,0.12); color: var(--green); }
.quiz-feedback.error { background: rgba(231,76,60,0.12); color: var(--red-soft); }
.quiz-nav { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
.quiz-nav-btn { padding: 12px 28px; border-radius: 12px; border: none; background: var(--purple); color: white; font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.quiz-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.quiz-score { margin: 16px 0; padding: 24px; background: var(--bg-card); border-radius: 16px; border: 2px solid var(--gold); }
.quiz-score h3 { color: var(--gold); font-size: 20px; margin-bottom: 8px; }
.quiz-score .big-num { font-size: 48px; font-weight: 800; color: var(--teal); }
.quiz-score .score-msg { color: var(--text-dim); font-size: 14px; margin-top: 12px; line-height: 1.5; }

/* METHOD */
.method-card { background: var(--bg-card); border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
.method-step { display: flex; gap: 14px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.method-step:last-child { border-bottom: none; }
.step-num { flex-shrink: 0; width: 36px; height: 36px; background: linear-gradient(135deg, var(--purple), var(--teal)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
.step-content h4 { color: var(--gold); font-size: 15px; margin-bottom: 4px; }
.step-content p { color: var(--text-dim); font-size: 13px; line-height: 1.5; }

/* PLAY ALL BAR */
.play-all-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(19,39,67,0.95); border-top: 1px solid rgba(255,255,255,0.08); padding: 12px 16px; display: flex; align-items: center; justify-content: center; gap: 12px; z-index: 50; backdrop-filter: blur(10px); }
.play-all-btn { padding: 10px 24px; border-radius: 25px; border: none; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(26,188,156,0.3); }
.play-all-btn:active { transform: scale(0.95); }
.play-all-btn.playing-all { background: linear-gradient(135deg, var(--red-soft), #C0392B); }
.repeat-count { display: flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 13px; }
.repeat-count button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: var(--text-light); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* CELEBRATION */
.celebration { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(11,25,41,0.95); z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; }
.celebration.show { display: flex; }
.celebration-content { text-align: center; padding: 30px; }
.celebration-emoji { font-size: 72px; animation: bounce 1s infinite; }
.celebration h2 { color: var(--gold); font-size: 28px; margin: 16px 0 8px; }
.celebration p { color: var(--text-dim); font-size: 16px; margin-bottom: 20px; }
.celebration-close { padding: 12px 30px; background: var(--teal); color: white; border: none; border-radius: 12px; font-family: 'Fredoka', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; }

/* RECITER SELECT */
.reciter-select { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center; }
.reciter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-dim); font-family: 'Fredoka', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.3s; }
.reciter-btn.active { background: var(--gold); color: var(--bg-main); border-color: var(--gold); font-weight: 600; }

@media (max-width: 380px) {
  .ayah-arabic { font-size: 22px; }
  .header h1 { font-size: 24px; }
  .tab-btn { padding: 8px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-icon">🌙</div>
    <h1>سورة العاديات</h1>
    <h2>Aprende Sura Al-Adiyat</h2>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span id="progressText">0 / 11 آيات</span>
      <span class="level" id="levelText">⭐ المبتدئ</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="stars-earned" id="starsRow"></div>
  </div>

  <div class="lang-toggle">
    <button class="lang-btn active" id="langEs" onclick="setLang('es')">Español</button>
    <button class="lang-btn" id="langAr" onclick="setLang('ar')">العربية</button>
  </div>

  <div class="tabs" id="tabsRow">
    <button class="tab-btn active" onclick="showSection('listen', this)">
      <span class="tab-icon">🎧</span> <span data-es="Escuchar" data-ar="استمع">Escuchar</span>
    </button>
    <button class="tab-btn" onclick="showSection('understand', this)">
      <span class="tab-icon">💡</span> <span data-es="Entender" data-ar="افهم">Entender</span>
    </button>
    <button class="tab-btn" onclick="showSection('quiz', this)">
      <span class="tab-icon">🧩</span> <span data-es="Prueba" data-ar="اختبار">Prueba</span>
    </button>
    <button class="tab-btn" onclick="showSection('method', this)">
      <span class="tab-icon">📖</span> <span data-es="Método" data-ar="المنهج">Método</span>
    </button>
  </div>

  <div class="section active" id="section-listen"></div>
  <div class="section" id="section-understand"></div>
  <div class="section" id="section-quiz"><div class="quiz-container" id="quizContainer"></div></div>
  <div class="section" id="section-method"></div>
</div>

<div class="play-all-bar" id="playAllBar">
  <div class="repeat-count">
    <button onclick="changeRepeat(-1)">−</button>
    <span id="repeatNum">3</span>×
    <button onclick="changeRepeat(1)">+</button>
  </div>
  <button class="play-all-btn" id="playAllBtn" onclick="togglePlayAll()">
    ▶ <span data-es="Escuchar todo" data-ar="استمع الكل">Escuchar todo</span>
  </button>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-content">
    <div class="celebration-emoji">🏆</div>
    <h2 id="celebTitle">ما شاء الله!</h2>
    <p id="celebText"></p>
    <button class="celebration-close" onclick="closeCelebration()">
      <span data-es="¡Seguir practicando!" data-ar="واصل التدرب!">¡Seguir practicando!</span>
    </button>
  </div>
</div>

<script>
// ========== SURAH DATA ==========
const AYAT = [

// ========== STATE ==========
let currentLang = 'es';
let currentReciter = 'husary';
let mastered = new Set();
let currentAudio = null;
let playingAyah = null;
let isPlayingAll = false;
let playAllIndex = 0;
let repeatCount = 3;
let currentRepeat = 0;
let quizQuestions = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;

try {
  const s1 = localStorage.getItem('adiyat_mastered');
  if (s1) mastered = new Set(JSON.parse(s1));
  const s2 = localStorage.getItem('adiyat_lang');
  if (s2) currentLang = s2;
  const s3 = localStorage.getItem('adiyat_reciter');
  if (s3 && RECITERS[s3]) currentReciter = s3;
} catch(e) {}

// ========== INIT ==========
function init() { renderAll(); updateProgress(); updateLangUI(); updateAllText(); }
function renderAll() { renderListenSection(); renderUnderstandSection(); renderMethodSection(); initQuiz(); }
function T(es, ar) { return currentLang === 'es' ? es : ar; }

function setLang(lang) {
  currentLang = lang;
  try { localStorage.setItem('adiyat_lang', lang); } catch(e) {}
  updateLangUI(); updateAllText(); renderAll();
}
function updateLangUI() {
  document.getElementById('langEs').classList.toggle('active', currentLang === 'es');
  document.getElementById('langAr').classList.toggle('active', currentLang === 'ar');
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
}
function updateAllText() {
  document.querySelectorAll('[data-es]').forEach(el => {
    el.textContent = currentLang === 'es' ? el.dataset.es : el.dataset.ar;
  });
}

function setReciter(key) {
  currentReciter = key;
  try { localStorage.setItem('adiyat_reciter', key); } catch(e) {}
  document.querySelectorAll('.reciter-btn').forEach(b => b.classList.toggle('active', b.dataset.reciter === key));
  stopAudio();
}
function getAudioUrl(ayahNum) { return RECITERS[currentReciter].getUrl(ayahNum); }

// ========== LISTEN SECTION ==========
function renderListenSection() {
  const c = document.getElementById('section-listen');
  let html = '<div class="reciter-select">';
  for (const [key, rec] of Object.entries(RECITERS)) {
    html += '<button class="reciter-btn ' + (key === currentReciter ? 'active' : '') + '" data-reciter="' + key + '" onclick="setReciter(\'' + key + '\')">' + (currentLang === 'es' ? rec.name : rec.nameAr) + '</button>';
  }
  html += '</div>';
  for (const a of AYAT) {
    const isMastered = mastered.has(a.num);
    html += '<div class="ayah-card ' + (isMastered ? 'mastered' : '') + '" id="ayah-' + a.num + '">'
      + '<div class="master-badge">\u2713</div>'
      + '<div class="ayah-number">' + a.num + '</div>'
      + '<div class="ayah-arabic">' + a.ar + '</div>'
      + '<div class="ayah-transliteration">' + a.translit + '</div>'
      + '<div class="ayah-translation ' + (currentLang === 'es' ? 'lang-es' : 'lang-ar') + '">' + (currentLang === 'es' ? a.es : a.arMeaning) + '</div>'
      + '<div class="ayah-controls">'
      + '<button class="ctrl-btn btn-listen" onclick="playAyah(' + a.num + ')">\u25B6 ' + T('Escuchar','\u0627\u0633\u062A\u0645\u0639') + '</button>'
      + '<button class="ctrl-btn btn-slow" onclick="playAyah(' + a.num + ', 0.65)">\uD83D\uDC22 ' + T('Lento','\u0628\u0637\u064A\u0621') + '</button>'
      + '<button class="ctrl-btn btn-repeat" onclick="playRepeat(' + a.num + ')">\uD83D\uDD01 ' + T('Repetir 3x','\u0643\u0631\u0631 \u0663\xD7') + '</button>'
      + '<button class="ctrl-btn btn-master ' + (isMastered ? 'done' : '') + '" onclick="toggleMaster(' + a.num + ')">'
      + (isMastered ? '\u2713 ' + T('Memorizada','\u0645\u062D\u0641\u0648\u0638\u0629') : '\u2B50 ' + T('Memoric\u00E9','\u062D\u0641\u0638\u062A\u0647\u0627'))
      + '</button></div>'
      + '<div class="audio-status" id="status-' + a.num + '"><div class="spinner"></div><span>' + T('Cargando audio...','\u062C\u0627\u0631\u064A \u062A\u062D\u0645\u064A\u0644 \u0627\u0644\u0635\u0648\u062A...') + '</span></div>'
      + '</div>';
  }
  c.innerHTML = html;
}

// ========== UNDERSTAND SECTION ==========
function renderUnderstandSection() {
  const c = document.getElementById('section-understand');
  let html = '<div class="method-card" style="border-color: var(--gold);">'
    + '<h3 style="color: var(--gold); font-size: 16px; margin-bottom: 6px;">'
    + T('\uD83D\uDCA1 \u00BFDe qu\u00E9 habla esta sura?','\uD83D\uDCA1 \u0639\u0646 \u0645\u0627\u0630\u0627 \u062A\u062A\u062D\u062F\u062B \u0647\u0630\u0647 \u0627\u0644\u0633\u0648\u0631\u0629\u061F')
    + '</h3><p style="color: var(--text-light); font-size: 14px; line-height: 1.7;' + (currentLang === 'ar' ? ' font-family:Baloo Bhaijaan 2,sans-serif;' : '') + '">'
    + T(
      'Allah empieza hablando de unos <strong style="color:var(--gold)">caballos de guerra incre\u00EDblemente fuertes</strong> \u2014 corren tan r\u00E1pido que jadean, hacen chispas con sus pezu\u00F1as y levantan nubes de polvo. \u00BFPor qu\u00E9? Para decirnos algo importante: <strong style="color:var(--teal)">esos caballos son fieles y agradecidos con sus due\u00F1os</strong>, pero el ser humano muchas veces NO es agradecido con Allah. La sura nos ense\u00F1a a <strong style="color:var(--green)">ser agradecidos y a recordar que Allah lo sabe todo</strong>.',
      '\u0627\u0644\u0644\u0647 \u064A\u0628\u062F\u0623 \u0628\u0627\u0644\u062D\u062F\u064A\u062B \u0639\u0646 <strong style="color:var(--gold)">\u062E\u064A\u0648\u0644 \u062D\u0631\u0628 \u0642\u0648\u064A\u0629 \u062C\u062F\u0627\u064B</strong> \u2014 \u062A\u0631\u0643\u0636 \u0628\u0633\u0631\u0639\u0629 \u062D\u062A\u0649 \u062A\u0644\u0647\u062B\u060C \u0648\u062D\u0648\u0627\u0641\u0631\u0647\u0627 \u062A\u064F\u062E\u0631\u062C \u0634\u0631\u0627\u0631\u0627\u062A\u060C \u0648\u062A\u064F\u062B\u064A\u0631 \u0633\u062D\u0628 \u0627\u0644\u063A\u0628\u0627\u0631. \u0644\u0645\u0627\u0630\u0627\u061F \u0644\u064A\u0642\u0648\u0644 \u0644\u0646\u0627 \u0634\u064A\u0626\u0627\u064B \u0645\u0647\u0645\u0627\u064B: <strong style="color:var(--teal)">\u062A\u0644\u0643 \u0627\u0644\u062E\u064A\u0648\u0644 \u0648\u0641\u064A\u0629 \u0648\u0634\u0627\u0643\u0631\u0629 \u0644\u0623\u0635\u062D\u0627\u0628\u0647\u0627</strong>\u060C \u0644\u0643\u0646 \u0627\u0644\u0625\u0646\u0633\u0627\u0646 \u0643\u062B\u064A\u0631\u0627\u064B \u0645\u0627 \u0644\u0627 \u064A\u0634\u0643\u0631 \u0627\u0644\u0644\u0647. \u0627\u0644\u0633\u0648\u0631\u0629 \u062A\u064F\u0639\u0644\u0651\u0645\u0646\u0627 \u0623\u0646 <strong style="color:var(--green)">\u0646\u0643\u0648\u0646 \u0634\u0627\u0643\u0631\u064A\u0646 \u0648\u0623\u0646 \u0646\u062A\u0630\u0643\u0631 \u0623\u0646 \u0627\u0644\u0644\u0647 \u064A\u0639\u0644\u0645 \u0643\u0644 \u0634\u064A\u0621</strong>.'
    )
    + '</p></div>';

  for (const a of AYAT) {
    html += '<div class="tafsir-card" id="tafsir-' + a.num + '">'
      + '<div class="tafsir-ayah">' + a.ar + '</div>'
      + '<div class="tafsir-explain ' + (currentLang === 'es' ? 'lang-es' : 'lang-ar') + '">'
      + (currentLang === 'es' ? a.tafsirEs : a.tafsirAr)
      + '</div>'
      + '<button class="ai-ask-btn" onclick="toggleAiBox(' + a.num + ')">\uD83E\uDD16 ' + T('Preg\u00FAntale a la IA sobre esta ayah','\u0627\u0633\u0623\u0644 \u0627\u0644\u0630\u0643\u0627\u0621 \u0627\u0644\u0627\u0635\u0637\u0646\u0627\u0639\u064A \u0639\u0646 \u0647\u0630\u0647 \u0627\u0644\u0622\u064A\u0629') + '</button>'
      + '<div id="ai-box-' + a.num + '" style="display:none;">'
      + '<div class="ai-input-row">'
      + '<input class="ai-input" id="ai-input-' + a.num + '" placeholder="' + T('Ej: \u00BFPor qu\u00E9 Allah jura por caballos?','\u0645\u062B\u0627\u0644: \u0644\u0645\u0627\u0630\u0627 \u064A\u0642\u0633\u0645 \u0627\u0644\u0644\u0647 \u0628\u0627\u0644\u062E\u064A\u0648\u0644\u061F') + '" onkeydown="if(event.key===\'Enter\')askAI(' + a.num + ')">'
      + '<button class="ai-send-btn" onclick="askAI(' + a.num + ')">\u27A4</button>'
      + '</div>'
      + '<div class="ai-response-box" id="ai-resp-' + a.num + '"></div>'
      + '</div></div>';
  }
  c.innerHTML = html;
}

function toggleAiBox(num) {
  const box = document.getElementById('ai-box-' + num);
  const isHidden = box.style.display === 'none';
  box.style.display = isHidden ? 'block' : 'none';
  if (isHidden) document.getElementById('ai-input-' + num).focus();
}

async function askAI(num) {
  const input = document.getElementById('ai-input-' + num);
  const respBox = document.getElementById('ai-resp-' + num);
  const question = input.value.trim();
  if (!question) return;

  const ayah = AYAT.find(a => a.num === num);
  respBox.className = 'ai-response-box show';
  respBox.innerHTML = '<div style="display:flex;align-items:center;gap:8px;"><div class="spinner"></div> ' + T('Pensando...','\u062C\u0627\u0631\u064D \u0627\u0644\u062A\u0641\u0643\u064A\u0631...') + '</div>';

  try {
    const sysPrompt = currentLang === 'es'
      ? 'Eres un maestro de Quran que explica a ni\u00F1os de 8 a\u00F1os. Responde en espa\u00F1ol de forma simple, con ejemplos que un ni\u00F1o entienda. Usa emojis. M\u00E1ximo 4 frases. La ayah es: "' + ayah.ar + '" que significa "' + ayah.es + '". Contexto: Sura Al-Adiyat (sura 100).'

// ========== AUDIO ==========
function playAyah(num, rate) {
  if (rate === undefined) rate = 1.0;
  stopAudio();
  var url = getAudioUrl(num);
  currentAudio = new Audio(url);
  playingAyah = num;

  var statusEl = document.getElementById('status-' + num);
  if (statusEl) { statusEl.classList.add('show'); statusEl.innerHTML = '<div class="spinner"></div><span>' + T('Cargando audio...','\u062C\u0627\u0631\u064A \u062A\u062D\u0645\u064A\u0644 \u0627\u0644\u0635\u0648\u062A...') + '</span>'; }

  document.querySelectorAll('.ayah-card').forEach(function(c) { c.classList.remove('playing'); });
  var card = document.getElementById('ayah-' + num);
  if (card) card.classList.add('playing');

  currentAudio.playbackRate = rate;

  currentAudio.oncanplaythrough = function() {
    if (statusEl) statusEl.classList.remove('show');
  };

  currentAudio.onerror = function() {
    if (statusEl) {
      statusEl.innerHTML = '<span style="color:var(--red-soft);">\u26A0\uFE0F ' + T('Error. Probando otro recitador...','\u062E\u0637\u0623. \u062C\u0627\u0631\u064A \u062A\u062C\u0631\u0628\u0629 \u0642\u0627\u0631\u0626 \u0622\u062E\u0631...') + '</span>';
    }
    tryFallbackAudio(num, rate, card, statusEl);
  };

  currentAudio.onended = function() {
    playingAyah = null;
    if (card) card.classList.remove('playing');
    if (statusEl) statusEl.classList.remove('show');
  };

  currentAudio.load();
  currentAudio.play().catch(function() {});
}

function tryFallbackAudio(num, rate, card, statusEl) {
  var keys = Object.keys(RECITERS).filter(function(k) { return k !== currentReciter; });
  var idx = 0;

  function tryNext() {
    if (idx >= keys.length) {
      if (statusEl) { statusEl.innerHTML = '<span style="color:var(--red-soft);">\u26A0\uFE0F ' + T('No se pudo cargar el audio.','\u0644\u0645 \u064A\u062A\u0645 \u062A\u062D\u0645\u064A\u0644 \u0627\u0644\u0635\u0648\u062A.') + '</span>'; setTimeout(function() { if(statusEl) statusEl.classList.remove('show'); }, 3000); }
      return;
    }
    var key = keys[idx++];
    var url = RECITERS[key].getUrl(num);
    if (currentAudio) { currentAudio.pause(); try { currentAudio.src = ''; } catch(e) {} }
    currentAudio = new Audio(url);
    currentAudio.playbackRate = rate;
    currentAudio.oncanplaythrough = function() { if (statusEl) statusEl.classList.remove('show'); };
    currentAudio.onerror = tryNext;
    currentAudio.onended = function() { playingAyah = null; if (card) card.classList.remove('playing'); };
    currentAudio.load();
    currentAudio.play().catch(tryNext);
  }
  tryNext();
}

function playRepeat(num) {
  var count = 0;
  var maxR = 3;
  function once() {
    if (count >= maxR) return;
    stopAudio();
    currentAudio = new Audio(getAudioUrl(num));
    currentAudio.playbackRate = 0.85;
    playingAyah = num;
    var card = document.getElementById('ayah-' + num);
    if (card) card.classList.add('playing');
    currentAudio.onended = function() { count++; if (count < maxR) { setTimeout(once, 1200); } else { playingAyah = null; if (card) card.classList.remove('playing'); } };
    currentAudio.load();
    currentAudio.play().catch(function() {});
  }
  once();
}

function stopAudio() {
  if (currentAudio) { currentAudio.pause(); try { currentAudio.src = ''; } catch(e) {} currentAudio = null; }
  document.querySelectorAll('.ayah-card').forEach(function(c) { c.classList.remove('playing'); });
  document.querySelectorAll('.audio-status').forEach(function(s) { s.classList.remove('show'); });
  playingAyah = null;
}

function startPlayAll() {

  btn.classList.add('playing-all');
  btn.innerHTML = '\u23F9 ' + T('Detener','\u0625\u064A\u0642\u0627\u0641');
  playNextInSequence();
}
function stopPlayAll() {
  isPlayingAll = false; stopAudio();
  var btn = document.getElementById('playAllBtn');
  btn.classList.remove('playing-all');
  btn.innerHTML = '\u25B6 ' + T('Escuchar todo','\u0627\u0633\u062A\u0645\u0639 \u0627\u0644\u0643\u0644');

function playNextInSequence() {
  if (!isPlayingAll) return;
  if (playAllIndex >= AYAT.length) { currentRepeat++; if (currentRepeat < repeatCount) { playAllIndex = 0; setTimeout(playNextInSequence, 1500); return; } stopPlayAll(); return; }
  var ayah = AYAT[playAllIndex];
  stopAudio();
  currentAudio = new Audio(getAudioUrl(ayah.num));
  playingAyah = ayah.num;
  document.querySelectorAll('.ayah-card').forEach(function(c) { c.classList.remove('playing'); });
  var card = document.getElementById('ayah-' + ayah.num);
  if (card) { card.classList.add('playing'); card.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  currentAudio.onended = function() { if (card) card.classList.remove('playing'); playAllIndex++; if (isPlayingAll) setTimeout(playNextInSequence, 800); };
  currentAudio.load();
  currentAudio.play().catch(function() {});
}
function changeRepeat(delta) { repeatCount = Math.max(1, Math.min(10, repeatCount + delta)); document.getElementById('repeatNum').textContent = repeatCount; }

// ========== QUIZ ==========
function shuffleArray(arr) { var a = arr.slice(); for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

function generateQuizQuestions() {
  var qs = [];
  for (var i = 0; i < AYAT.length - 1; i++) {
    var correct = AYAT[i + 1];
    var wrongs = shuffleArray(AYAT.filter(function(_, idx) { return idx !== i + 1; })).slice(0, 2);
    var options = shuffleArray([correct].concat(wrongs));
    qs.push({ type: 'next', promptLabel: T('\u00BFCu\u00E1l es la siguiente ayah?','\u0645\u0627 \u0627\u0644\u0622\u064A\u0629 \u0627\u0644\u062A\u0627\u0644\u064A\u0629\u061F'), promptAyah: AYAT[i].ar, correctNum: correct.num, options: options.map(function(o) { return { text: o.ar, num: o.num }; }) });
  }
  for (var i = 0; i < AYAT.length; i++) {
    var correct = AYAT[i];
    var wrongs = shuffleArray(AYAT.filter(function(_, idx) { return idx !== i; })).slice(0, 2);
    var options = shuffleArray([correct].concat(wrongs));
    qs.push({ type: 'meaning', promptLabel: T('\u00BFQu\u00E9 significa esta ayah?','\u0645\u0627 \u0645\u0639\u0646\u0649 \u0647\u0630\u0647 \u0627\u0644\u0622\u064A\u0629\u061F'), promptAyah: AYAT[i].ar, correctNum: correct.num, options: options.map(function(o) { return { text: currentLang === 'es' ? o.es : o.arMeaning, num: o.num }; }) });
  }
  return shuffleArray(qs).slice(0, 8);
}

function initQuiz() {
  quizQuestions = generateQuizQuestions();
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  var c = document.getElementById('quizContainer');
  if (quizIndex >= quizQuestions.length) {
    var pct = Math.round((quizScore / quizQuestions.length) * 100);
    var msg;
    if (pct >= 80) msg = T('\u00A1\u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647! \u00A1Excelente trabajo!','!\u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647! \u0639\u0645\u0644 \u0645\u0645\u062A\u0627\u0632');
    else if (pct >= 50) msg = T('\u00A1Buen trabajo! Sigue practicando.','!\u0639\u0645\u0644 \u062C\u064A\u062F! \u0648\u0627\u0635\u0644 \u0627\u0644\u062A\u062F\u0631\u0628');
    else msg = T('\u00A1No te rindas! Escucha m\u00E1s y vuelve a intentar.','!\u0644\u0627 \u062A\u0633\u062A\u0633\u0644\u0645! \u0627\u0633\u062A\u0645\u0639 \u0623\u0643\u062B\u0631 \u0648\u062D\u0627\u0648\u0644 \u0645\u0631\u0629 \u0623\u062E\u0631\u0649');
    c.innerHTML = '<div class="quiz-score"><h3>' + T('\u00A1Resultado del Quiz!','!\u0646\u062A\u064A\u062C\u0629 \u0627\u0644\u0627\u062E\u062A\u0628\u0627\u0631') + '</h3><div class="big-num">' + pct + '%</div><p style="color:var(--text-dim);margin-top:8px;">' + quizScore + '/' + quizQuestions.length + ' ' + T('correctas','\u0635\u062D\u064A\u062D\u0629') + '</p><p class="score-msg">' + msg + '</p></div><div class="quiz-nav"><button class="quiz-nav-btn" onclick="initQuiz()">\uD83D\uDD01 ' + T('Intentar de nuevo','\u062D\u0627\u0648\u0644 \u0645\u0631\u0629 \u0623\u062E\u0631\u0649') + '</button></div>';
    return;
  }

  var q = quizQuestions[quizIndex];
  quizAnswered = false;
  var isMeaning = q.type === 'meaning';

  var optHtml = '';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    var cls = 'quiz-option' + (isMeaning ? ' meaning-opt' : '') + (isMeaning && currentLang === 'es' ? ' lang-es' : '');
    optHtml += '<button class="' + cls + '" id="qopt-' + i + '" onclick="handleQuizAnswer(' + i + ',' + q.options.map(function(o){return o.num;}).indexOf(q.correctNum) + ')">' + opt.text + '</button>';
  }

  c.innerHTML = '<div class="quiz-header">' + T('Pregunta','\u0633\u0624\u0627\u0644') + ' ' + (quizIndex + 1) + ' / ' + quizQuestions.length + '</div>'
    + '<div class="quiz-type-label">' + (q.type === 'next' ? T('Completa la secuencia','\u0623\u0643\u0645\u0644 \u0627\u0644\u062A\u0633\u0644\u0633\u0644') : T('Conoce el significado','\u0627\u0639\u0631\u0641 \u0627\u0644\u0645\u0639\u0646\u0649')) + '</div>'
    + '<p class="quiz-prompt-text">' + q.promptLabel + '</p>'
    + '<div class="quiz-prompt">' + q.promptAyah + '</div>'
    + '<div class="quiz-options">' + optHtml + '</div>'
    + '<div class="quiz-feedback" id="quizFeedback"></div>'
    + '<div class="quiz-nav"><button class="quiz-nav-btn" id="quizNextBtn" disabled onclick="quizNext()">' + T('Siguiente \u2192','\u2190 \u0627\u0644\u062A\u0627\u0644\u064A') + '</button></div>';
}

function handleQuizAnswer(selected, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  var feedback = document.getElementById('quizFeedback');
  var selectedBtn = document.getElementById('qopt-' + selected);
  var correctBtn = document.getElementById('qopt-' + correct);
  document.querySelectorAll('.quiz-option').forEach(function(o) { o.classList.add('disabled'); });
  if (selected === correct) {
    selectedBtn.classList.add('correct');
    quizScore++;
    feedback.className = 'quiz-feedback show success';
    feedback.textContent = T('\u2705 \u00A1Correcto! \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647','\u2705 !\u0635\u062D\u064A\u062D! \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647');
  } else {
    selectedBtn.classList.add('wrong');
    correctBtn.classList.add('correct');
    feedback.className = 'quiz-feedback show error';
    feedback.textContent = T('\u274C Incorrecto. Mira la respuesta correcta.','\u274C \u063A\u064A\u0631 \u0635\u062D\u064A\u062D. \u0627\u0646\u0638\u0631 \u0627\u0644\u0625\u062C\u0627\u0628\u0629 \u0627\u0644\u0635\u062D\u064A\u062D\u0629.');
  }
  document.getElementById('quizNextBtn').disabled = false;
}

function quizNext() { quizIndex++; renderQuizQuestion(); }

// ========== SECTIONS ==========
function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('section-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  document.getElementById('playAllBar').style.display = name === 'listen' ? 'flex' : 'none';
  if (name === 'quiz') initQuiz();
}

// ========== CELEBRATION ==========
function showCelebration() {
  document.getElementById('celebration').classList.add('show');
  document.getElementById('celebTitle').textContent = T('\uD83C\uDFC6 \u00A1\u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647!','\uD83C\uDFC6 !\u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647');
  document.getElementById('celebText').textContent = T('\u00A1Has memorizado toda Surat Al-Adiyat!','!\u0644\u0642\u062F \u062D\u0641\u0638\u062A \u0633\u0648\u0631\u0629 \u0627\u0644\u0639\u0627\u062F\u064A\u0627\u062A \u0643\u0627\u0645\u0644\u0629');
}
function closeCelebration() { document.getElementById('celebration').classList.remove('show'); }

// ========== BOOT ==========
init();
</script>
</body>
</html>
