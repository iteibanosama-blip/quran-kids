<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>مغامرة العاديات</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Baloo+Bhaijaan+2:wght@400;600;800&family=Lilita+One&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--gold:#FFD700;--goldd:#DAA520;--goldl:#FFF8DC;
--teal:#00D9A6;--teald:#00B88C;--sky:#64CFFF;
--purple:#A855F7;--purpled:#7C3AED;--green:#34D399;
--red:#F87171;--orange:#FB923C;--pink:#F472B6;
--bg:#0A0E27;--bg2:#111640;--card:#161B4A;--card2:#1E2460;
--text:#E8EAFF;--dim:#7B83B5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Fredoka','Baloo Bhaijaan 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;user-select:none}
.skybg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,#0A0E27,#1A1040 40%,#2D1B69 70%,#1A1040)}
.skybg .st{position:absolute;inset:0;background-image:radial-gradient(2px 2px at 10% 15%,#fff 0%,transparent 100%),radial-gradient(2px 2px at 25% 35%,#FFD700 0%,transparent 100%),radial-gradient(1px 1px at 40% 10%,#fff 0%,transparent 100%),radial-gradient(2px 2px at 55% 45%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 70% 20%,#FFD700 0%,transparent 100%),radial-gradient(2px 2px at 85% 30%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 15% 60%,#fff 0%,transparent 100%),radial-gradient(2px 2px at 60% 55%,#FFD700 0%,transparent 100%);animation:tw 3s ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.4}100%{opacity:.8}}
#ptc{position:fixed;inset:0;z-index:1;pointer-events:none}
.app{position:relative;z-index:2;max-width:480px;margin:0 auto;padding:12px;padding-bottom:110px}

/* STAR MASCOT */
.mascot{text-align:center;padding:6px 0}
.sbox{display:inline-block;position:relative;animation:sf 3s ease-in-out infinite}
@keyframes sf{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.sico{font-size:52px;transition:all .5s;filter:drop-shadow(0 0 14px rgba(255,215,0,.4))}
.sbox.gl .sico{animation:sg .3s ease 3}
@keyframes sg{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.15) rotate(12deg)}}
.slv{position:absolute;bottom:-5px;right:-8px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:7px}
.snm{font-family:'Lilita One';font-size:15px;color:var(--gold);margin-top:2px;text-shadow:0 0 10px rgba(255,215,0,.3)}
.smd{font-size:10px;color:var(--dim)}

/* XP */
.xps{background:var(--card);border-radius:14px;padding:10px 14px;margin:6px 0;border:1px solid rgba(255,255,255,.04)}
.xpt{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.xlv{font-family:'Lilita One';font-size:12px;color:var(--purple)}
.xco{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--gold);font-weight:600;cursor:pointer}
.xtr{height:8px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
.xfl{height:100%;background:linear-gradient(90deg,#A855F7,#EC4899,#F59E0B);border-radius:6px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.xtx{font-size:9px;color:var(--dim);margin-top:2px;text-align:center}

/* POWERUPS INVENTORY */
.powers-bar{display:flex;gap:4px;justify-content:center;margin:4px 0;flex-wrap:wrap}
.pw-badge{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:8px;background:var(--card);border:1px solid rgba(255,255,255,.06);font-size:10px;color:var(--goldl)}
.pw-badge .pw-ct{color:var(--gold);font-weight:700}

.cpop{position:fixed;z-index:200;pointer-events:none;font-size:15px;font-weight:700;color:var(--gold);text-shadow:0 0 8px rgba(255,215,0,.5);animation:cu 1.2s ease-out forwards}
@keyframes cu{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

.lr{display:flex;justify-content:center;gap:5px;margin:6px 0}
.lb{padding:5px 16px;border-radius:14px;border:2px solid rgba(255,255,255,.06);background:transparent;color:var(--dim);font-family:'Fredoka';font-size:12px;cursor:pointer;transition:all .3s}
.lb.a{background:var(--teal);color:#fff;border-color:var(--teal)}

.tabs{display:flex;gap:4px;margin:8px 0;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 11px;border-radius:10px;border:none;background:var(--card);color:var(--dim);font-family:'Fredoka';font-size:11px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tb.a{background:var(--purple);color:#fff;box-shadow:0 3px 12px rgba(168,85,247,.3)}
.sec{display:none;animation:fs .4s ease}.sec.a{display:block}
@keyframes fs{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* AYAH CARDS */
.ac{background:var(--card);border-radius:14px;padding:14px;margin-bottom:8px;border:2px solid transparent;transition:all .3s;position:relative;overflow:hidden}
.ac.pl{border-color:var(--teal);box-shadow:0 0 18px rgba(0,217,166,.1)}
.ac.ma{border-color:var(--green)}
.ac.ma::after{content:'\2713';position:absolute;top:6px;left:6px;width:18px;height:18px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.an{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#fff;border-radius:50%;font-weight:700;font-size:11px;margin-bottom:5px}
.aar{font-family:'Amiri',serif;font-size:24px;line-height:1.9;color:var(--goldl);text-align:right;direction:rtl;margin-bottom:5px}
.aar .w{display:inline;transition:color .15s,text-shadow .15s;padding:0 1px}
.aar .w.hi{color:var(--gold)!important;text-shadow:0 0 12px rgba(255,215,0,.5),0 0 25px rgba(255,215,0,.2)}
.aar .w.dn{color:var(--goldl)}
.atr{font-size:11px;color:var(--sky);margin-bottom:3px;direction:ltr;text-align:left;font-style:italic}
.amn{font-size:11px;color:var(--dim);line-height:1.4}
.amn.es{direction:ltr;text-align:left}.amn.ar{direction:rtl;text-align:right;font-family:'Baloo Bhaijaan 2'}
.abs{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.ab{padding:5px 9px;border-radius:7px;border:none;font-family:'Fredoka';font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;color:#fff;transition:all .2s}
.ab:active{transform:scale(.92)}
.ab1{background:var(--teal)}.ab2{background:linear-gradient(135deg,var(--purple),var(--pink))}.ab3{background:var(--purpled)}.ab4{background:var(--orange)}.ab5{background:var(--green)}.ab5.d{background:rgba(52,211,153,.3)}
.rr{display:flex;gap:4px;margin-bottom:8px;justify-content:center;flex-wrap:wrap}
.rb{padding:3px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:transparent;color:var(--dim);font-family:'Fredoka';font-size:10px;cursor:pointer;transition:all .3s}
.rb.a{background:var(--goldd);color:#fff;border-color:var(--goldd)}

/* ADVENTURE */
.adv-story{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,215,0,.12);position:relative;overflow:hidden}
.adv-story::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--orange),var(--purple))}
.adv-nar{font-size:12px;line-height:1.7;color:var(--text)}
.adv-nar.ar{direction:rtl;text-align:right;font-family:'Baloo Bhaijaan 2'}
.adv-nar .hl{color:var(--gold);font-weight:600}
.adv-ch{font-family:'Lilita One';font-size:16px;color:var(--gold);text-align:center;margin-bottom:4px}

.advn{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:6px;border:2px solid rgba(255,255,255,.04);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:10px}
.advn:hover{border-color:var(--teal)}
.advn.lk{opacity:.3;cursor:not-allowed;filter:grayscale(.7)}
.advn.cu{border-color:var(--gold);box-shadow:0 0 14px rgba(255,215,0,.18);animation:np 2s infinite}
@keyframes np{0%,100%{box-shadow:0 0 14px rgba(255,215,0,.18)}50%{box-shadow:0 0 22px rgba(255,215,0,.35)}}
.advn.dn{border-color:var(--green);opacity:.8}
.advn-ic{font-size:24px;flex-shrink:0;width:40px;height:40px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center}
.advn-info{flex:1}
.advn-t{font-family:'Lilita One';font-size:12px;color:var(--goldl)}
.advn.dn .advn-t{color:var(--green)}
.advn-s{font-size:9px;color:var(--dim);margin-top:1px}
.advn-stars{display:flex;gap:2px}.advn-stars span{font-size:10px;opacity:.2}.advn-stars span.on{opacity:1}

/* MODAL */
.mdl{display:none;position:fixed;inset:0;background:rgba(10,14,39,.96);z-index:100;align-items:center;justify-content:center;padding:12px}
.mdl.sh{display:flex}
.mdl-b{background:var(--card);border-radius:16px;padding:18px;max-width:440px;width:100%;border:2px solid var(--goldd);position:relative;max-height:92vh;overflow-y:auto}
.mdl-x{position:absolute;top:6px;right:10px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;z-index:5}
.mdl-t{font-family:'Lilita One';font-size:16px;color:var(--gold);text-align:center;margin-bottom:2px}
.mdl-st{font-size:11px;color:var(--dim);text-align:center;margin-bottom:8px}
.mdl-ar{font-family:'Amiri',serif;font-size:24px;color:var(--goldl);text-align:center;direction:rtl;line-height:1.8;margin-bottom:8px;padding:10px;background:var(--bg2);border-radius:10px}
.msn{display:flex;align-items:center;gap:8px;padding:9px;background:var(--bg2);border-radius:9px;border:2px solid transparent;cursor:pointer;transition:all .3s;margin-bottom:5px}
.msn.d{border-color:var(--green);opacity:.6}
.msn-ic{font-size:20px;flex-shrink:0}
.msn-tx{font-size:11px;color:var(--text);line-height:1.3}
.msn-rw{font-size:9px;color:var(--gold);margin-top:1px}
.mdl-area{margin-top:8px}
/* mini quiz */
.mq-os{display:flex;flex-direction:column;gap:5px;margin:8px 0}
.mq-o{padding:9px 12px;background:var(--card2);border:2px solid rgba(255,255,255,.04);border-radius:9px;color:var(--text);font-size:13px;cursor:pointer;transition:all .3s;text-align:right;direction:rtl;font-family:'Amiri',serif;line-height:1.4}
.mq-o.mn{font-family:'Fredoka';font-size:11px}.mq-o.mn.es{direction:ltr;text-align:left}
.mq-o.ok{border-color:var(--green)!important;background:rgba(52,211,153,.08)!important}
.mq-o.no{border-color:var(--red)!important;background:rgba(248,113,113,.08)!important;animation:shake .4s}
.mq-o.off{pointer-events:none;opacity:.35}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.mq-fb{padding:8px;border-radius:7px;margin:6px 0;font-size:11px;font-weight:600;text-align:center;display:none}
.mq-fb.sh{display:block}.mq-fb.g{background:rgba(52,211,153,.08);color:var(--green)}.mq-fb.b{background:rgba(248,113,113,.08);color:var(--red)}

/* SHOP */
.shop-intro{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;text-align:center;border:1px solid rgba(255,215,0,.1)}
.shop-intro h3{font-family:'Lilita One';font-size:16px;color:var(--gold);margin-bottom:4px}
.shop-intro p{font-size:11px;color:var(--dim);line-height:1.5}
.shop-cat{font-family:'Lilita One';font-size:13px;color:var(--purple);margin:10px 0 6px;display:flex;align-items:center;gap:5px}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.si{background:var(--card);border-radius:12px;padding:12px;text-align:center;border:2px solid rgba(255,255,255,.03);cursor:pointer;transition:all .3s;position:relative}
.si:hover{border-color:var(--gold)}
.si.got{border-color:var(--green);opacity:.7}.si.got::after{content:'\2713';position:absolute;top:5px;right:5px;background:var(--green);color:#fff;width:16px;height:16px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center}
.si.cant{opacity:.35}
.si-ic{font-size:28px;margin-bottom:4px}
.si-nm{font-size:11px;color:var(--goldl);font-weight:600;margin-bottom:2px;min-height:26px;line-height:1.2}
.si-desc{font-size:9px;color:var(--dim);margin-bottom:4px;min-height:22px;line-height:1.3}
.si-pr{font-size:11px;color:var(--gold);font-weight:700}
.si.got .si-pr{color:var(--green)}
.si-qty{font-size:9px;color:var(--teal);margin-top:2px}

/* TREASURE POPUP */
.tpop{display:none;position:fixed;inset:0;background:rgba(10,14,39,.97);z-index:150;align-items:center;justify-content:center;padding:14px}
.tpop.sh{display:flex}
.tpop-b{background:var(--card);border-radius:18px;padding:22px;max-width:380px;width:100%;border:2px solid var(--gold);text-align:center}
.tpop-ic{font-size:52px;margin-bottom:8px;animation:bounce 1s infinite}
.tpop-t{font-family:'Lilita One';font-size:18px;color:var(--gold);margin-bottom:4px}
.tpop-desc{font-size:12px;color:var(--text);line-height:1.6;margin-bottom:6px}
.tpop-desc.ar{direction:rtl;font-family:'Baloo Bhaijaan 2'}
.tpop-eff{font-size:10px;color:var(--teal);margin-bottom:12px;padding:6px;background:rgba(0,217,166,.08);border-radius:8px}
.tpop-btn{padding:9px 22px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-family:'Fredoka';font-size:13px;font-weight:600;cursor:pointer}

/* TAFSIR */
.tc{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid rgba(255,255,255,.03)}
.ta{font-family:'Amiri',serif;font-size:20px;color:var(--goldl);text-align:right;margin-bottom:6px;line-height:1.7;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.03)}
.tt{font-size:11px;line-height:1.6;color:var(--text)}
.tt.es{direction:ltr;text-align:left}.tt.ar{direction:rtl;text-align:right;font-family:'Baloo Bhaijaan 2'}
.tt .kw{color:var(--gold);font-weight:600}
.tt .eb{font-size:22px;display:block;text-align:center;margin:3px 0}
.aib{display:inline-flex;align-items:center;gap:3px;margin-top:6px;padding:5px 9px;background:linear-gradient(135deg,var(--purple),#6C3AED);border:none;border-radius:7px;color:#fff;font-family:'Fredoka';font-size:9px;cursor:pointer}
.aibx{display:none;margin-top:6px}.aibx.sh{display:block;animation:fs .3s}
.airow{display:flex;gap:4px}
.aiin{flex:1;padding:7px 9px;border-radius:7px;border:1px solid rgba(255,255,255,.06);background:var(--bg);color:var(--text);font-family:'Fredoka';font-size:10px;outline:none}
.aigo{padding:7px 10px;border-radius:7px;border:none;background:var(--purple);color:#fff;font-size:12px;cursor:pointer}
.aiout{margin-top:5px;padding:8px;background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.1);border-radius:7px;font-size:10px;line-height:1.5;display:none}
.aiout.sh{display:block;animation:fs .3s}
.sp{width:11px;height:11px;border:2px solid var(--teal);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* QUIZ */
.qbox{text-align:center}
.qi{font-size:10px;color:var(--dim);margin-bottom:5px}
.qtp{display:inline-block;padding:2px 7px;border-radius:5px;background:rgba(168,85,247,.12);color:var(--purple);font-size:9px;margin-bottom:3px;font-weight:600}
.qq{color:var(--sky);font-size:12px;margin-bottom:2px}
.qpr{font-family:'Amiri',serif;font-size:21px;color:var(--goldl);padding:12px;margin:5px 0;background:var(--card);border-radius:10px;direction:rtl;min-height:40px;display:flex;align-items:center;justify-content:center;line-height:1.6}
.qos{display:flex;flex-direction:column;gap:5px;margin:8px 0}
.qo{padding:9px 12px;background:var(--card);border:2px solid rgba(255,255,255,.04);border-radius:9px;color:var(--text);font-size:13px;cursor:pointer;transition:all .3s;text-align:right;direction:rtl;font-family:'Amiri',serif;line-height:1.3}
.qo.mn{font-family:'Fredoka';font-size:11px}.qo.mn.es{direction:ltr;text-align:left}
.qo.ok{border-color:var(--green)!important;background:rgba(52,211,153,.08)!important}
.qo.no{border-color:var(--red)!important;background:rgba(248,113,113,.08)!important;animation:shake .4s}
.qo.off{pointer-events:none;opacity:.35}
.qfb{padding:8px;border-radius:7px;margin:6px 0;font-size:11px;font-weight:600;text-align:center;display:none}
.qfb.sh{display:block}.qfb.g{background:rgba(52,211,153,.06);color:var(--green)}.qfb.b{background:rgba(248,113,113,.06);color:var(--red)}
.qnx{padding:7px 18px;border-radius:7px;border:none;background:var(--purple);color:#fff;font-family:'Fredoka';font-size:11px;font-weight:600;cursor:pointer}.qnx:disabled{opacity:.25}
.qr{padding:16px;background:var(--card);border-radius:12px;border:2px solid var(--gold);margin:8px 0}.qr h3{color:var(--gold);font-size:14px}.qr .big{font-size:36px;font-weight:800;color:var(--teal);margin:4px 0}

/* METHOD */
.mcd{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px}
.mst{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.02)}.mst:last-child{border:none}
.mic{flex-shrink:0;width:28px;height:28px;background:linear-gradient(135deg,var(--purple),var(--teal));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.mbd h4{color:var(--gold);font-size:12px;margin-bottom:1px}.mbd p{color:var(--dim);font-size:10px;line-height:1.4}

/* PLAY BAR */
.pbar{position:fixed;bottom:0;left:0;right:0;background:rgba(22,27,74,.95);border-top:1px solid rgba(255,255,255,.04);padding:7px 10px;display:flex;align-items:center;justify-content:center;gap:7px;z-index:50;backdrop-filter:blur(8px)}
.pbtn{padding:7px 16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--teal),var(--teald));color:#fff;font-family:'Fredoka';font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,217,166,.2)}
.pbtn:active{transform:scale(.95)}.pbtn.stp{background:linear-gradient(135deg,var(--red),#DC2626)}
.rpc{display:flex;align-items:center;gap:3px;color:var(--dim);font-size:10px}
.rpc button{width:22px;height:22px;border-radius:50%;border:1px solid rgba(255,255,255,.08);background:transparent;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.clb{position:fixed;inset:0;background:rgba(10,14,39,.96);z-index:200;display:none;align-items:center;justify-content:center}
.clb.sh{display:flex}
.clbi{text-align:center;padding:18px}
.clbic{font-size:50px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.clb h2{font-family:'Lilita One';font-size:20px;color:var(--gold);margin:8px 0 3px}
.clb p{color:var(--dim);font-size:12px;margin-bottom:12px}
.clbbtn{padding:8px 20px;background:var(--teal);color:#fff;border:none;border-radius:9px;font-family:'Fredoka';font-size:12px;font-weight:600;cursor:pointer}
@media(max-width:380px){.aar{font-size:20px}.sico{font-size:42px}.tb{padding:5px 7px;font-size:9px}}
</style>
</head>
<body>
<div class="skybg"><div class="st"></div></div>
<canvas id="ptc"></canvas>
<div class="app">
  <div class="mascot">
    <div class="sbox" id="sbox"><div class="sico" id="sico">⭐</div><div class="slv" id="slv">Nv.1</div></div>
    <div class="snm" id="snm">Nur</div>
    <div class="smd" id="smd"></div>
  </div>
  <div class="xps">
    <div class="xpt"><div class="xlv" id="xlv">Nivel 1</div><div class="xco" onclick="goTab('shop')">🪙 <span id="coN">0</span></div></div>
    <div class="xtr"><div class="xfl" id="xfl" style="width:0%"></div></div>
    <div class="xtx" id="xtx">0 / 100 XP</div>
  </div>
  <div class="powers-bar" id="pwBar"></div>

<script>
var A=[
{n:1,ar:"\u0648\u064E\u0627\u0644\u0652\u0639\u064E\u0627\u062F\u0650\u064A\u064E\u0627\u062A\u0650 \u0636\u064E\u0628\u0652\u062D\u064B\u0627",w:["\u0648\u064E\u0627\u0644\u0652\u0639\u064E\u0627\u062F\u0650\u064A\u064E\u0627\u062A\u0650","\u0636\u064E\u0628\u0652\u062D\u064B\u0627"],tr:"Wal-'aadiyaati dabha",es:"\u00A1Por los que corren jadeando!",am:"\u0623\u064F\u0642\u0633\u0650\u0645\u064F \u0628\u0627\u0644\u062A\u064A \u062A\u062C\u0631\u064A \u0648\u062A\u062A\u0646\u0641\u0633 \u0628\u0635\u0648\u062A",tE:"Allah jura por los <span class='kw'>guerreros que corren</span> tan r\u00E1pido que respiran fuerte, como cuando t\u00FA corres y te cansas. <span class='eb'>\uD83D\uDCA8</span>",tA:"\u0627\u0644\u0644\u0647 \u064A\u064F\u0642\u0633\u0650\u0645 \u0628\u0627\u0644\u0639\u0627\u062F\u064A\u0627\u062A \u0627\u0644\u062A\u064A \u062A\u062C\u0631\u064A \u0628\u0633\u0631\u0639\u0629 \u0648\u062A\u062A\u0646\u0641\u0633 \u0628\u0635\u0648\u062A \u0639\u0627\u0644\u064D. <span class='eb'>\uD83D\uDCA8</span>",ic:"\uD83C\uDF05",sc:"El Inicio",stE:"Estamos en el desierto al amanecer. El aire es fresco y el cielo se llena de estrellas que se apagan. <span class='hl'>De repente, se escucha un sonido fuerte</span>: algo corre con toda su fuerza por la arena, respirando tan r\u00E1pido que su aliento suena como truenos lejanos...",stA:"\u0646\u062D\u0646 \u0641\u064A \u0627\u0644\u0635\u062D\u0631\u0627\u0621 \u0639\u0646\u062F \u0627\u0644\u0641\u062C\u0631. \u0627\u0644\u0647\u0648\u0627\u0621 \u0628\u0627\u0631\u062F \u0648\u0627\u0644\u0646\u062C\u0648\u0645 \u062A\u062E\u062A\u0641\u064A. <span class='hl'>\u0641\u062C\u0623\u0629\u060C \u0646\u0633\u0645\u0639 \u0635\u0648\u062A\u0627\u064B \u0642\u0648\u064A\u0627\u064B</span>: \u0634\u064A\u0621 \u064A\u0631\u0643\u0636 \u0628\u0643\u0644 \u0642\u0648\u062A\u0647 \u0639\u0644\u0649 \u0627\u0644\u0631\u0645\u0627\u0644..."},
{n:2,ar:"\u0641\u064E\u0627\u0644\u0652\u0645\u064F\u0648\u0631\u0650\u064A\u064E\u0627\u062A\u0650 \u0642\u064E\u062F\u0652\u062D\u064B\u0627",w:["\u0641\u064E\u0627\u0644\u0652\u0645\u064F\u0648\u0631\u0650\u064A\u064E\u0627\u062A\u0650","\u0642\u064E\u062F\u0652\u062D\u064B\u0627"],tr:"Fal-mooriyaati qadha",es:"\u00A1Hacen saltar chispas!",am:"\u0627\u0644\u062A\u064A \u062A\u064F\u062E\u0631\u062C \u0634\u0631\u0627\u0631\u0627\u064B \u0645\u0646 \u062D\u0648\u0627\u0641\u0631\u0647\u0627",tE:"Al golpear las rocas, <span class='kw'>saltan chispas de fuego</span>. <span class='eb'>\uD83D\uDD25\u2728</span>",tA:"<span class='kw'>\u062D\u0648\u0627\u0641\u0631\u0647\u0627 \u062A\u064F\u062E\u0631\u062C \u0634\u0631\u0627\u0631\u0627\u062A \u0646\u0627\u0631\u064A\u0629</span> \u0639\u0646\u062F \u0627\u0644\u0627\u0635\u0637\u062F\u0627\u0645 \u0628\u0627\u0644\u0635\u062E\u0648\u0631. <span class='eb'>\uD83D\uDD25\u2728</span>",ic:"\uD83D\uDD25",sc:"Las Chispas",stE:"Mientras corren sobre las piedras, <span class='hl'>chispas de fuego saltan en la oscuridad</span> como peque\u00F1as estrellas fugaces. El desierto se ilumina por un instante con cada paso. \u00BFQu\u00E9 fuerza tan incre\u00EDble tienen?",stA:"\u0623\u062B\u0646\u0627\u0621 \u0627\u0644\u0631\u0643\u0636 \u0639\u0644\u0649 \u0627\u0644\u062D\u062C\u0627\u0631\u0629\u060C <span class='hl'>\u062A\u062A\u0637\u0627\u064A\u0631 \u0634\u0631\u0627\u0631\u0627\u062A \u0627\u0644\u0646\u0627\u0631 \u0641\u064A \u0627\u0644\u0638\u0644\u0627\u0645</span> \u0643\u0627\u0644\u0646\u062C\u0648\u0645. \u064A\u0627 \u0644\u0647\u0627 \u0645\u0646 \u0642\u0648\u0629!"},
{n:3,ar:"\u0641\u064E\u0627\u0644\u0652\u0645\u064F\u063A\u0650\u064A\u0631\u064E\u0627\u062A\u0650 \u0635\u064F\u0628\u0652\u062D\u064B\u0627",w:["\u0641\u064E\u0627\u0644\u0652\u0645\u064F\u063A\u0650\u064A\u0631\u064E\u0627\u062A\u0650","\u0635\u064F\u0628\u0652\u062D\u064B\u0627"],tr:"Fal-mugheraati subha",es:"\u00A1Atacan al amanecer!",am:"\u0627\u0644\u062A\u064A \u062A\u064F\u063A\u064A\u0631 \u0648\u0642\u062A \u0627\u0644\u0635\u0628\u0627\u062D",tE:"<span class='kw'>Atacaban al amanecer</span> cuando todo estaba en calma. <span class='eb'>\uD83C\uDF05\u2694\uFE0F</span>",tA:"<span class='kw'>\u062A\u0647\u062C\u0645 \u0641\u064A \u0627\u0644\u0635\u0628\u0627\u062D \u0627\u0644\u0628\u0627\u0643\u0631</span> \u0639\u0646\u062F\u0645\u0627 \u064A\u0643\u0648\u0646 \u0643\u0644 \u0634\u064A\u0621 \u0647\u0627\u062F\u0626\u0627\u064B. <span class='eb'>\uD83C\uDF05\u2694\uFE0F</span>",ic:"\u2694\uFE0F",sc:"El Amanecer",stE:"El sol empieza a asomarse. <span class='hl'>Es el momento perfecto</span>: cuando nadie se lo espera, los guerreros aparecen con toda su fuerza. El silencio del amanecer se rompe con el sonido de su valent\u00EDa.",stA:"\u0627\u0644\u0634\u0645\u0633 \u062A\u0628\u062F\u0623 \u0628\u0627\u0644\u0638\u0647\u0648\u0631. <span class='hl'>\u0625\u0646\u0647 \u0627\u0644\u0648\u0642\u062A \u0627\u0644\u0645\u062B\u0627\u0644\u064A</span>: \u0639\u0646\u062F\u0645\u0627 \u0644\u0627 \u064A\u062A\u0648\u0642\u0639 \u0623\u062D\u062F\u060C \u064A\u0638\u0647\u0631 \u0627\u0644\u0645\u062D\u0627\u0631\u0628\u0648\u0646."},
{n:4,ar:"\u0641\u064E\u0623\u064E\u062B\u064E\u0631\u0652\u0646\u064E \u0628\u0650\u0647\u0650 \u0646\u064E\u0642\u0652\u0639\u064B\u0627",w:["\u0641\u064E\u0623\u064E\u062B\u064E\u0631\u0652\u0646\u064E","\u0628\u0650\u0647\u0650","\u0646\u064E\u0642\u0652\u0639\u064B\u0627"],tr:"Fa-atharna bihi naq'a",es:"\u00A1Levantan nubes de polvo!",am:"\u0641\u0623\u062B\u0627\u0631\u062A \u063A\u0628\u0627\u0631\u0627\u064B \u0643\u062B\u064A\u0641\u0627\u064B",tE:"Corren tan fuerte que <span class='kw'>levantan nubes de polvo</span> gigantes. <span class='eb'>\uD83C\uDF2B\uFE0F</span>",tA:"\u062A\u0631\u0643\u0636 \u0628\u0642\u0648\u0629 \u062D\u062A\u0649 <span class='kw'>\u062A\u064F\u062B\u064A\u0631 \u0633\u062D\u0628\u0627\u064B \u0645\u0646 \u0627\u0644\u063A\u0628\u0627\u0631</span>. <span class='eb'>\uD83C\uDF2B\uFE0F</span>",ic:"\uD83C\uDF2B\uFE0F",sc:"La Tormenta",stE:"Detr\u00E1s de ellos se levanta una <span class='hl'>enorme nube de polvo</span> que cubre todo el horizonte. Es como una tormenta en el desierto: tan poderosa que no puedes ver nada detr\u00E1s. \u00A1As\u00ED de fuertes son!",stA:"\u062E\u0644\u0641\u0647\u0645 \u062A\u0631\u062A\u0641\u0639 <span class='hl'>\u0633\u062D\u0627\u0628\u0629 \u063A\u0628\u0627\u0631 \u0636\u062E\u0645\u0629</span> \u062A\u063A\u0637\u064A \u0627\u0644\u0623\u0641\u0642 \u0643\u0644\u0647. \u0643\u0639\u0627\u0635\u0641\u0629 \u0641\u064A \u0627\u0644\u0635\u062D\u0631\u0627\u0621!"},
{n:5,ar:"\u0641\u064E\u0648\u064E\u0633\u064E\u0637\u0652\u0646\u064E \u0628\u0650\u0647\u0650 \u062C\u064E\u0645\u0652\u0639\u064B\u0627",w:["\u0641\u064E\u0648\u064E\u0633\u064E\u0637\u0652\u0646\u064E","\u0628\u0650\u0647\u0650","\u062C\u064E\u0645\u0652\u0639\u064B\u0627"],tr:"Fawasatna bihi jam'a",es:"\u00A1Penetran entre los enemigos!",am:"\u0641\u062F\u062E\u0644\u062A \u0641\u064A \u0648\u0633\u0637 \u0627\u0644\u0623\u0639\u062F\u0627\u0621",tE:"Entran <span class='kw'>en medio de los enemigos</span> sin miedo alguno. <span class='eb'>\u26A1\uD83D\uDEE1\uFE0F</span>",tA:"\u062A\u062F\u062E\u0644 <span class='kw'>\u0641\u064A \u0648\u0633\u0637 \u0627\u0644\u0623\u0639\u062F\u0627\u0621</span> \u0628\u062F\u0648\u0646 \u062E\u0648\u0641. <span class='eb'>\u26A1\uD83D\uDEE1\uFE0F</span>",ic:"\uD83D\uDEE1\uFE0F",sc:"La Batalla",stE:"Y entonces, <span class='hl'>sin un segundo de duda, entran directos al centro</span> del grupo enemigo. No tienen miedo. No se detienen. Su valent\u00EDa es completa. Pero... \u00BFpor qu\u00E9 nos cuenta Allah todo esto? La respuesta est\u00E1 por llegar...",stA:"\u0648\u0639\u0646\u062F\u0647\u0627\u060C <span class='hl'>\u0628\u062F\u0648\u0646 \u062A\u0631\u062F\u062F\u060C \u062A\u062F\u062E\u0644 \u0641\u064A \u0642\u0644\u0628 \u0627\u0644\u0645\u0639\u0631\u0643\u0629</span>. \u0644\u0627 \u062E\u0648\u0641. \u0644\u0627 \u062A\u0648\u0642\u0641. \u0644\u0643\u0646... \u0644\u0645\u0627\u0630\u0627 \u064A\u062E\u0628\u0631\u0646\u0627 \u0627\u0644\u0644\u0647 \u0628\u0643\u0644 \u0647\u0630\u0627\u061F \u0627\u0644\u062C\u0648\u0627\u0628 \u0642\u0627\u062F\u0645..."},
{n:6,ar:"\u0625\u0650\u0646\u0651\u064E \u0627\u0644\u0652\u0625\u0650\u0646\u0633\u064E\u0627\u0646\u064E \u0644\u0650\u0631\u064E\u0628\u0651\u0650\u0647\u0650 \u0644\u064E\u0643\u064E\u0646\u064F\u0648\u062F\u064C",w:["\u0625\u0650\u0646\u0651\u064E","\u0627\u0644\u0652\u0625\u0650\u0646\u0633\u064E\u0627\u0646\u064E","\u0644\u0650\u0631\u064E\u0628\u0651\u0650\u0647\u0650","\u0644\u064E\u0643\u064E\u0646\u064F\u0648\u062F\u064C"],tr:"Innal-insaana lirabbihi lakanood",es:"El ser humano es ingrato con su Se\u00F1or.",am:"\u0625\u0646 \u0627\u0644\u0625\u0646\u0633\u0627\u0646 \u062C\u0627\u062D\u062F \u0644\u0646\u0639\u0645 \u0631\u0628\u0647",tE:"Aqu\u00ED est\u00E1 la lecci\u00F3n: <span class='kw'>el humano es desagradecido</span> con Allah. <span class='eb'>\uD83D\uDE14\uD83E\uDD32</span>",tA:"\u0647\u0646\u0627 \u0627\u0644\u062F\u0631\u0633: <span class='kw'>\u0627\u0644\u0625\u0646\u0633\u0627\u0646 \u062C\u0627\u062D\u062F</span> \u0644\u0646\u0639\u0645 \u0627\u0644\u0644\u0647. <span class='eb'>\uD83D\uDE14\uD83E\uDD32</span>",ic:"\uD83D\uDCA1",sc:"La Gran Lecci\u00F3n",stE:"\u00A1AQU\u00CD EST\u00C1! La raz\u00F3n de toda esa descripci\u00F3n incre\u00EDble. Allah nos dice: <span class='hl'>esos guerreros son fieles y valientes con sus l\u00EDderes... pero el ser humano, a pesar de todo lo que Allah le da, muchas veces NO le da las gracias.</span> \u00BFT\u00FA das gracias a Allah por tu comida, tu familia, que puedes respirar?",stA:"\u0647\u0646\u0627 \u0627\u0644\u0633\u0631! \u0627\u0644\u0633\u0628\u0628 \u0648\u0631\u0627\u0621 \u0643\u0644 \u0630\u0644\u0643 \u0627\u0644\u0648\u0635\u0641 \u0627\u0644\u0645\u0630\u0647\u0644. \u0627\u0644\u0644\u0647 \u064A\u0642\u0648\u0644 \u0644\u0646\u0627: <span class='hl'>\u0647\u0624\u0644\u0627\u0621 \u0627\u0644\u0645\u062D\u0627\u0631\u0628\u0648\u0646 \u0623\u0648\u0641\u064A\u0627\u0621 \u0644\u0642\u0627\u062F\u062A\u0647\u0645... \u0644\u0643\u0646 \u0627\u0644\u0625\u0646\u0633\u0627\u0646 \u0631\u063A\u0645 \u0643\u0644 \u0646\u0639\u0645 \u0627\u0644\u0644\u0647 \u0644\u0627 \u064A\u0634\u0643\u0631\u0647.</span>"},
{n:7,ar:"\u0648\u064E\u0625\u0650\u0646\u0651\u064E\u0647\u064F \u0639\u064E\u0644\u064E\u0649\u0670 \u0630\u064E\u0670\u0644\u0650\u0643\u064E \u0644\u064E\u0634\u064E\u0647\u0650\u064A\u062F\u064C",w:["\u0648\u064E\u0625\u0650\u0646\u0651\u064E\u0647\u064F","\u0639\u064E\u0644\u064E\u0649\u0670","\u0630\u064E\u0670\u0644\u0650\u0643\u064E","\u0644\u064E\u0634\u064E\u0647\u0650\u064A\u062F\u064C"],tr:"Wa innahu 'alaa dhaalika lashaheed",es:"\u00C9l mismo es testigo de eso.",am:"\u0648\u0627\u0644\u0625\u0646\u0633\u0627\u0646 \u0646\u0641\u0633\u0647 \u064A\u0634\u0647\u062F \u0639\u0644\u0649 \u062C\u062D\u0648\u062F\u0647",tE:"T\u00FA <span class='kw'>sabes por dentro</span> que a veces eres desagradecido. <span class='eb'>\uD83D\uDCAD</span>",tA:"\u0623\u0646\u062A <span class='kw'>\u062A\u0639\u0631\u0641 \u0641\u064A \u062F\u0627\u062E\u0644\u0643</span> \u0623\u0646\u0643 \u0623\u062D\u064A\u0627\u0646\u0627\u064B \u062C\u0627\u062D\u062F. <span class='eb'>\uD83D\uDCAD</span>",ic:"\uD83D\uDCAD",sc:"El Espejo",stE:"Y aqu\u00ED viene algo que te va a hacer pensar: <span class='hl'>t\u00FA mismo lo sabes.</span> No puedes enga\u00F1arte. Cuando no dices 'Alhamdulillah' por la comida, cuando no agradeces a tus padres... tu coraz\u00F3n lo sabe. Es como un espejo que siempre dice la verdad.",stA:"\u0648\u0647\u0646\u0627 \u0634\u064A\u0621 \u0633\u064A\u062C\u0639\u0644\u0643 \u062A\u0641\u0643\u0631: <span class='hl'>\u0623\u0646\u062A \u0646\u0641\u0633\u0643 \u062A\u0639\u0631\u0641.</span> \u0644\u0627 \u062A\u0633\u062A\u0637\u064A\u0639 \u062E\u062F\u0627\u0639 \u0646\u0641\u0633\u0643. \u0642\u0644\u0628\u0643 \u0643\u0627\u0644\u0645\u0631\u0622\u0629 \u0627\u0644\u062A\u064A \u062A\u0642\u0648\u0644 \u0627\u0644\u062D\u0642\u064A\u0642\u0629 \u062F\u0627\u0626\u0645\u0627\u064B."},
{n:8,ar:"\u0648\u064E\u0625\u0650\u0646\u0651\u064E\u0647\u064F \u0644\u0650\u062D\u064F\u0628\u0651\u0650 \u0627\u0644\u0652\u062E\u064E\u064A\u0652\u0631\u0650 \u0644\u064E\u0634\u064E\u062F\u0650\u064A\u062F\u064C",w:["\u0648\u064E\u0625\u0650\u0646\u0651\u064E\u0647\u064F","\u0644\u0650\u062D\u064F\u0628\u0651\u0650","\u0627\u0644\u0652\u062E\u064E\u064A\u0652\u0631\u0650","\u0644\u064E\u0634\u064E\u062F\u0650\u064A\u062F\u064C"],tr:"Wa innahu lihubbil-khayri lashadeed",es:"Ama intensamente las riquezas.",am:"\u0627\u0644\u0625\u0646\u0633\u0627\u0646 \u0634\u062F\u064A\u062F \u0627\u0644\u062D\u0628 \u0644\u0644\u0645\u0627\u0644",tE:"El humano <span class='kw'>ama demasiado las cosas materiales</span>. <span class='eb'>\uD83D\uDCB0</span>",tA:"\u0627\u0644\u0625\u0646\u0633\u0627\u0646 <span class='kw'>\u064A\u062D\u0628 \u0627\u0644\u0645\u0627\u0644 \u062D\u0628\u0627\u064B \u0634\u062F\u064A\u062F\u0627\u064B</span>. <span class='eb'>\uD83D\uDCB0</span>",ic:"\uD83D\uDCB0",sc:"La Trampa",stE:"\u00BFPor qu\u00E9 somos desagradecidos? Porque <span class='hl'>nos encanta tener m\u00E1s cosas</span>: m\u00E1s juguetes, m\u00E1s dinero, m\u00E1s, m\u00E1s, m\u00E1s. Y nos olvidamos de lo que ya tenemos. Es como una trampa: siempre quieres m\u00E1s y nunca est\u00E1s contento.",stA:"\u0644\u0645\u0627\u0630\u0627 \u0646\u062D\u0646 \u062C\u0627\u062D\u062F\u0648\u0646\u061F \u0644\u0623\u0646\u0646\u0627 <span class='hl'>\u0646\u062D\u0628 \u0627\u0644\u062D\u0635\u0648\u0644 \u0639\u0644\u0649 \u0627\u0644\u0645\u0632\u064A\u062F</span>: \u0623\u0644\u0639\u0627\u0628 \u0623\u0643\u062B\u0631\u060C \u0645\u0627\u0644 \u0623\u0643\u062B\u0631. \u0648\u0646\u0646\u0633\u0649 \u0645\u0627 \u0639\u0646\u062F\u0646\u0627. \u0625\u0646\u0647\u0627 \u0641\u062E."},
{n:9,ar:"\u0623\u064E\u0641\u064E\u0644\u064E\u0627 \u064A\u064E\u0639\u0652\u0644\u064E\u0645\u064F \u0625\u0650\u0630\u064E\u0627 \u0628\u064F\u0639\u0652\u062B\u0650\u0631\u064E \u0645\u064E\u0627 \u0641\u0650\u064A \u0627\u0644\u0652\u0642\u064F\u0628\u064F\u0648\u0631\u0650",w:["\u0623\u064E\u0641\u064E\u0644\u064E\u0627","\u064A\u064E\u0639\u0652\u0644\u064E\u0645\u064F","\u0625\u0650\u0630\u064E\u0627","\u0628\u064F\u0639\u0652\u062B\u0650\u0631\u064E","\u0645\u064E\u0627","\u0641\u0650\u064A","\u0627\u0644\u0652\u0642\u064F\u0628\u064F\u0648\u0631\u0650"],tr:"Afalaa ya'lamu idhaa bu'thira maa fil-quboor",es:"Cuando se abran las tumbas...",am:"\u0645\u0627\u0630\u0627 \u0633\u064A\u062D\u062F\u062B \u0639\u0646\u062F\u0645\u0627 \u064A\u064F\u0628\u0639\u062B \u0627\u0644\u0645\u0648\u062A\u0649",tE:"\u00BFNo sabes que <span class='kw'>todos ser\u00E1n resucitados</span>? <span class='eb'>\u23F0</span>",tA:"\u0623\u0644\u0627 \u062A\u0639\u0644\u0645 \u0623\u0646 <span class='kw'>\u0627\u0644\u062C\u0645\u064A\u0639 \u0633\u064A\u064F\u0628\u0639\u062B\u0648\u0646</span>\u061F <span class='eb'>\u23F0</span>",ic:"\u23F0",sc:"El Despertar",stE:"Y ahora Allah nos avisa: <span class='hl'>\u00BFno sabes que llegar\u00E1 un D\u00EDa</span> en el que todos ser\u00E1n despertados? Es el D\u00EDa del Juicio. Ese d\u00EDa no podr\u00E1s esconderte ni mentir. Todo lo que hiciste, bueno o malo, estar\u00E1 ah\u00ED.",stA:"\u0648\u0627\u0644\u0622\u0646 \u0627\u0644\u0644\u0647 \u064A\u0646\u0628\u0647\u0646\u0627: <span class='hl'>\u0623\u0644\u0627 \u062A\u0639\u0644\u0645 \u0623\u0646 \u064A\u0648\u0645\u0627\u064B \u0633\u064A\u0623\u062A\u064A</span> \u064A\u064F\u0628\u0639\u062B \u0641\u064A\u0647 \u0627\u0644\u062C\u0645\u064A\u0639\u061F \u064A\u0648\u0645 \u0627\u0644\u0642\u064A\u0627\u0645\u0629. \u0644\u0627 \u0627\u062E\u062A\u0628\u0627\u0621 \u0648\u0644\u0627 \u0643\u0630\u0628."},
{n:10,ar:"\u0648\u064E\u062D\u064F\u0635\u0651\u0650\u0644\u064E \u0645\u064E\u0627 \u0641\u0650\u064A \u0627\u0644\u0635\u0651\u064F\u062F\u064F\u0648\u0631\u0650",w:["\u0648\u064E\u062D\u064F\u0635\u0651\u0650\u0644\u064E","\u0645\u064E\u0627","\u0641\u0650\u064A","\u0627\u0644\u0635\u0651\u064F\u062F\u064F\u0648\u0631\u0650"],tr:"Wa hussila maa fis-sudoor",es:"Se revele lo de los corazones.",am:"\u0648\u0623\u064F\u0638\u0647\u0650\u0631 \u0645\u0627 \u0641\u064A \u0627\u0644\u0642\u0644\u0648\u0628",tE:"Allah <span class='kw'>mostrar\u00E1 todo lo de tu coraz\u00F3n</span>. <span class='eb'>\u2764\uFE0F\uD83D\uDD0D</span>",tA:"\u0627\u0644\u0644\u0647 <span class='kw'>\u0633\u064A\u064F\u0638\u0647\u0631 \u0643\u0644 \u0645\u0627 \u0641\u064A \u0642\u0644\u0628\u0643</span>. <span class='eb'>\u2764\uFE0F\uD83D\uDD0D</span>",ic:"\u2764\uFE0F",sc:"Los Secretos",stE:"Ese d\u00EDa, <span class='hl'>Allah abrir\u00E1 tu coraz\u00F3n y mostrar\u00E1 todo</span>: tus secretos, tus intenciones, si fuiste sincero o no. No hay truco que valga. Por eso es tan importante tener un coraz\u00F3n limpio AHORA.",stA:"\u0641\u064A \u0630\u0644\u0643 \u0627\u0644\u064A\u0648\u0645\u060C <span class='hl'>\u0627\u0644\u0644\u0647 \u0633\u064A\u0641\u062A\u062D \u0642\u0644\u0628\u0643 \u0648\u064A\u064F\u0638\u0647\u0631 \u0643\u0644 \u0634\u064A\u0621</span>: \u0623\u0633\u0631\u0627\u0631\u0643\u060C \u0646\u0648\u0627\u064A\u0627\u0643. \u0644\u0647\u0630\u0627 \u0646\u0638\u0651\u0641 \u0642\u0644\u0628\u0643 \u0627\u0644\u0622\u0646."},
{n:11,ar:"\u0625\u0650\u0646\u0651\u064E \u0631\u064E\u0628\u0651\u064E\u0647\u064F\u0645 \u0628\u0650\u0647\u0650\u0645\u0652 \u064A\u064E\u0648\u0652\u0645\u064E\u0626\u0650\u0630\u064D \u0644\u0651\u064E\u062E\u064E\u0628\u0650\u064A\u0631\u064C",w:["\u0625\u0650\u0646\u0651\u064E","\u0631\u064E\u0628\u0651\u064E\u0647\u064F\u0645","\u0628\u0650\u0647\u0650\u0645\u0652","\u064A\u064E\u0648\u0652\u0645\u064E\u0626\u0650\u0630\u064D","\u0644\u0651\u064E\u062E\u064E\u0628\u0650\u064A\u0631\u064C"],tr:"Inna rabbahum bihim yawma-idhin lakhabeer",es:"Su Se\u00F1or sabe todo de ellos.",am:"\u0627\u0644\u0644\u0647 \u0639\u0627\u0644\u0645\u064C \u0628\u0643\u0644 \u0623\u0639\u0645\u0627\u0644\u0647\u0645",tE:"<span class='kw'>Allah sabe TODO</span>. Haz el bien y ten un coraz\u00F3n limpio. <span class='eb'>\uD83C\uDF1F</span>",tA:"<span class='kw'>\u0627\u0644\u0644\u0647 \u064A\u0639\u0644\u0645 \u0643\u0644 \u0634\u064A\u0621</span>. \u0627\u0641\u0639\u0644 \u0627\u0644\u062E\u064A\u0631 \u0648\u0646\u0638\u0651\u0641 \u0642\u0644\u0628\u0643. <span class='eb'>\uD83C\uDF1F</span>",ic:"\uD83C\uDF1F",sc:"El Final",stE:"Y la sura termina con la verdad m\u00E1s grande: <span class='hl'>Allah lo sabe absolutamente TODO</span>. No puedes esconder nada. Pero esto no es para asustarte \u2014 es para motivarte. Si sabes que Allah te ve, <span class='hl'>\u00BFno quieres que te vea haciendo cosas buenas?</span> S\u00E9 agradecido. S\u00E9 bueno. Ten un coraz\u00F3n limpio. \u00A1Esa es la misi\u00F3n!",stA:"\u0648\u0627\u0644\u0633\u0648\u0631\u0629 \u062A\u0646\u062A\u0647\u064A \u0628\u0623\u0639\u0638\u0645 \u062D\u0642\u064A\u0642\u0629: <span class='hl'>\u0627\u0644\u0644\u0647 \u064A\u0639\u0644\u0645 \u0643\u0644 \u0634\u064A\u0621</span>. \u0644\u0627 \u062A\u062E\u0641 - \u0628\u0644 \u0627\u062C\u0639\u0644 \u0647\u0630\u0627 \u062F\u0627\u0641\u0639\u0627\u064B \u0644\u0643. <span class='hl'>\u0625\u0630\u0627 \u0643\u0627\u0646 \u0627\u0644\u0644\u0647 \u064A\u0631\u0627\u0643\u060C \u0623\u0644\u0627 \u062A\u0631\u064A\u062F \u0623\u0646 \u064A\u0631\u0627\u0643 \u062A\u0641\u0639\u0644 \u0627\u0644\u062E\u064A\u0631\u061F</span>"}
];

function playNx(){if(!isPA)return;if(paI>=A.length){rCu++;if(rCu<rC){paI=0;setTimeout(playNx,1200);return;}stopPA();return;}var a=A[paI];stopA();au=new Audio(gUrl(a.n));paN=a.n;var cd=document.getElementById('ay'+a.n);if(cd){cd.classList.add('pl');cd.scrollIntoView({behavior:'smooth',block:'center'});}au.onended=function(){if(cd)cd.classList.remove('pl');paI++;if(isPA)setTimeout(playNx,600);};au.load();au.play().catch(function(){});}

// MASTERY
function togM(n){var el=document.getElementById('ay'+n);if(mast.has(n)){mast.delete(n);}else{mast.add(n);addXP(25,el);rBurst(el);glowStar();}sv();renderList();renderAdv();if(mast.size===11)showClb(T('\uD83C\uDFC6 \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647!','\uD83C\uDFC6 !\u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647'),T('\u00A1Toda la sura memorizada!','\u062D\u0641\u0638\u062A \u0627\u0644\u0633\u0648\u0631\u0629 \u0643\u0627\u0645\u0644\u0629!'),'\uD83C\uDFC6');}

  A.forEach(function(a){
    h+='<div class="tc"><div class="ta">'+a.ar+'</div><div class="tt '+(L==='es'?'es':'ar')+'">'+(L==='es'?a.tE:a.tA)+'</div>'
    +'<button class="aib" onclick="togAI('+a.n+')">\uD83E\uDD16 '+T('Pregunta a la IA','\u0627\u0633\u0623\u0644 \u0627\u0644\u0630\u0643\u0627\u0621')+'</button>'
    +'<div class="aibx" id="aib'+a.n+'"><div class="airow"><input class="aiin" id="aii'+a.n+'" placeholder="'+T('\u00BFPor qu\u00E9...?','\u0644\u0645\u0627\u0630\u0627\u061F')+'" onkeydown="if(event.key===\'Enter\')askAI('+a.n+')"><button class="aigo" onclick="askAI('+a.n+')">\u27A4</button></div><div class="aiout" id="aio'+a.n+'"></div></div></div>';
  });
  c.innerHTML=h;
}
function togAI(n){var b=document.getElementById('aib'+n);b.classList.toggle('sh');if(b.classList.contains('sh'))document.getElementById('aii'+n).focus();}
async function askAI(n){
  var inp=document.getElementById('aii'+n),out=document.getElementById('aio'+n),q=inp.value.trim();if(!q)return;
  var a=A.find(function(x){return x.n===n});
  out.className='aiout sh';out.innerHTML='<div style="display:flex;align-items:center;gap:4px"><div class="sp"></div>'+T('Pensando...','\u062C\u0627\u0631\u064D \u0627\u0644\u062A\u0641\u0643\u064A\u0631...')+'</div>';
  try{var sys=L==='es'?'Maestro Quran para ni\u00F1os 8 a\u00F1os. Espa\u00F1ol simple, emojis, max 4 frases. Ayah: "'+a.ar+'" = "'+a.es+'". Sura 100.':'\u0645\u0639\u0644\u0645 \u0642\u0631\u0622\u0646 \u0644\u0623\u0637\u0641\u0627\u0644 \u0668 \u0633\u0646\u0648\u0627\u062A. \u0639\u0631\u0628\u064A \u0628\u0633\u064A\u0637\u060C \u0625\u064A\u0645\u0648\u062C\u064A\u060C \u0664 \u062C\u0645\u0644. \u0627\u0644\u0622\u064A\u0629: "'+a.ar+'" = "'+a.am+'". \u0633\u0648\u0631\u0629 \u0661\u0660\u0660.';
  var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:q}]})});
  var d=await r.json();out.innerHTML=(d.content||[]).map(function(c){return c.text||''}).join('')||'...';}catch(e){out.innerHTML=T('\u26A0\uFE0F Error','\u26A0\uFE0F \u062E\u0637\u0623');}
}

// =========== SHOP ===========
function renderShop(){
  var c=document.getElementById('sec-shop');
  var h='<div class="shop-intro"><h3>🏪 '+T('Tesoros y Poderes','\u0643\u0646\u0648\u0632 \u0648\u0642\u0648\u0649')+'</h3><p>'+T('Gasta tus monedas en poderes que te ayudan en la aventura, o descubre secretos incre\u00EDbles sobre la sura.','\u0623\u0646\u0641\u0642 \u0639\u0645\u0644\u0627\u062A\u0643 \u0639\u0644\u0649 \u0642\u0648\u0649 \u062A\u0633\u0627\u0639\u062F\u0643 \u0641\u064A \u0627\u0644\u0645\u063A\u0627\u0645\u0631\u0629\u060C \u0623\u0648 \u0627\u0643\u062A\u0634\u0641 \u0623\u0633\u0631\u0627\u0631\u0627\u064B \u0645\u0630\u0647\u0644\u0629.')+'</p><div style="margin-top:6px;font-size:13px;color:var(--gold);font-weight:700">🪙 '+co+'</div></div>';

  h+='<div class="shop-cat">\u26A1 '+T('Poderes (te ayudan en el juego)','\u0642\u0648\u0649 (\u062A\u0633\u0627\u0639\u062F\u0643 \u0641\u064A \u0627\u0644\u0644\u0639\u0628\u0629)')+'</div><div class="shop-grid">';
  SHOP_POWERS.forEach(function(p){
    var canBuy=co>=p.price;
    h+='<div class="si '+(canBuy?'':'cant')+'" onclick="buyPow(\''+p.id+'\','+p.price+')">'
      +'<div class="si-ic">'+p.ic+'</div>'
      +'<div class="si-nm">'+(L==='es'?p.nmE:p.nmA)+'</div>'
      +'<div class="si-desc">'+(L==='es'?p.descE:p.descA)+'</div>'
      +'<div class="si-pr">🪙 '+p.price+'</div>'
      +(inv[p.id]>0?'<div class="si-qty">x'+inv[p.id]+' '+T('tienes','عندك')+'</div>':'')
      +'</div>';
  });
  h+='</div>';

  h+='<div class="shop-cat">\uD83D\uDD13 '+T('Secretos de la Sura (descubre algo nuevo)','\u0623\u0633\u0631\u0627\u0631 \u0627\u0644\u0633\u0648\u0631\u0629 (\u0627\u0643\u062A\u0634\u0641 \u0634\u064A\u0626\u0627\u064B \u062C\u062F\u064A\u062F\u0627\u064B)')+'</div><div class="shop-grid">';
  SHOP_SECRETS.forEach(function(s){
    var got=bought.has(s.id);
    var canBuy=co>=s.price&&!got;
    h+='<div class="si '+(got?'got':canBuy?'':'cant')+'" onclick="'+(got?'showSecret(\''+s.id+'\')':'buySecret(\''+s.id+'\','+s.price+')')+'">'
      +'<div class="si-ic">'+s.ic+'</div>'
      +'<div class="si-nm">'+(L==='es'?s.nmE:s.nmA)+'</div>'
      +'<div class="si-pr">'+(got?'\u2705 '+T('Descubierto','\u0645\u0643\u062A\u0634\u0641'):'🪙 '+s.price)+'</div>'
      +'</div>';
  });
  h+='</div>';
  c.innerHTML=h;
}

function buyPow(id,price){
  if(!spendCo(price))return;
  inv[id]=(inv[id]||0)+1;sv();renderShop();
  showTreasure(SHOP_POWERS.find(function(p){return p.id===id}).ic,T('\u00A1Poder comprado!','\u062A\u0645 \u0634\u0631\u0627\u0621 \u0627\u0644\u0642\u0648\u0629!'),T('Ahora tienes x'+inv[id]+'. \u00DAsalo en la aventura o en el quiz.','\u0627\u0644\u0622\u0646 \u0639\u0646\u062F\u0643 x'+inv[id]+'. \u0627\u0633\u062A\u062E\u062F\u0645\u0647\u0627 \u0641\u064A \u0627\u0644\u0645\u063A\u0627\u0645\u0631\u0629 \u0623\u0648 \u0627\u0644\u0627\u062E\u062A\u0628\u0627\u0631.'));
}

function buySecret(id,price){
  if(!spendCo(price))return;
  bought.add(id);sv();
  var s=SHOP_SECRETS.find(function(x){return x.id===id});
  if(s.bonusXp)addXP(s.bonusXp);
  renderShop();
  showSecret(id);
}

function showSecret(id){
  var s=SHOP_SECRETS.find(function(x){return x.id===id});
  if(s.isCert){showCertDialog(s);return;}
  showTreasure(s.ic,T(s.nmE,s.nmA),'<div class="'+(L==='ar'?'tpop-desc ar':'tpop-desc')+'">'+(L==='es'?s.revE:s.revA)+'</div>');
}

function showTreasure(ic,title,body){
  var tp=document.getElementById('tpop');
  document.getElementById('tpopB').innerHTML='<div class="tpop-ic">'+ic+'</div><div class="tpop-t">'+title+'</div><div>'+body+'</div><button class="tpop-btn" onclick="closeTreas()" style="margin-top:12px">'+T('\u00A1Genial!','\u0631\u0627\u0626\u0639!')+'</button>';
  tp.classList.add('sh');
  burst(innerWidth/2,innerHeight/2,40,['#FFD700','#A855F7','#34D399','#FB923C','#F472B6']);
}
function closeTreas(){document.getElementById('tpop').classList.remove('sh');}

function showCertDialog(s){
  var tp=document.getElementById('tpop');
  document.getElementById('tpopB').innerHTML='<div class="tpop-ic">\uD83C\uDFC6</div><div class="tpop-t">'+T('Certificado de Hafiz','\u0634\u0647\u0627\u062F\u0629 \u062D\u0627\u0641\u0638')+'</div><div class="tpop-desc">'+T('Escribe tu nombre para generar tu certificado personalizado:','\u0627\u0643\u062A\u0628 \u0627\u0633\u0645\u0643 \u0644\u0625\u0646\u0634\u0627\u0621 \u0634\u0647\u0627\u062F\u062A\u0643:')+'</div><input id="certName" class="aiin" style="width:100%;margin:8px 0;font-size:14px;padding:10px;text-align:center" placeholder="'+T('Tu nombre','\u0627\u0633\u0645\u0643')+'"><button class="tpop-btn" onclick="genCert()">'+T('\u00A1Generar!','\u0623\u0646\u0634\u0626!')+'</button>';
  tp.classList.add('sh');
}

function genCert(){
  var name=document.getElementById('certName').value.trim()||T('Estudiante','\u0637\u0627\u0644\u0628');
  var today=new Date().toLocaleDateString(L==='es'?'es-ES':'ar-SA');
  document.getElementById('tpopB').innerHTML='<div style="background:linear-gradient(135deg,#1A1040,#2D1B69);border-radius:14px;padding:24px;border:3px solid var(--gold);text-align:center">'
    +'<div style="font-size:36px;margin-bottom:8px">\uD83C\uDFC6</div>'
    +'<div style="font-family:Lilita One;font-size:18px;color:var(--gold);margin-bottom:4px">'+T('CERTIFICADO DE HAFIZ','\u0634\u0647\u0627\u062F\u0629 \u062D\u0627\u0641\u0638')+'</div>'
    +'<div style="font-size:11px;color:var(--dim);margin-bottom:12px">'+T('Sura Al-Adiyat (100)','\u0633\u0648\u0631\u0629 \u0627\u0644\u0639\u0627\u062F\u064A\u0627\u062A (\u0661\u0660\u0660)')+'</div>'
    +'<div style="font-family:Amiri,serif;font-size:22px;color:var(--goldl);margin:12px 0">'+name+'</div>'
    +'<div style="font-size:11px;color:var(--teal);margin-bottom:8px">'+T('Ha completado la memorizaci\u00F3n y comprensi\u00F3n','\u0623\u062A\u0645 \u062D\u0641\u0638 \u0648\u0641\u0647\u0645')+'</div>'
    +'<div style="font-size:10px;color:var(--dim)">'+today+'</div>'
    +'</div><button class="tpop-btn" onclick="closeTreas()" style="margin-top:12px">'+T('\u2764\uFE0F \u00A1M\u00E1shaAllah!','\u2764\uFE0F \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647!')+'</button>';
  burst(innerWidth/2,innerHeight/3,50,['#FFD700','#FF6B6B','#A855F7','#34D399','#FB923C','#F472B6','#64CFFF']);
}

// =========== QUIZ ===========
function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=~~(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function initQ(){
  qQs=[];
  for(var i=0;i<A.length-1;i++){var co=A[i+1];var wr=shuf(A.filter(function(_,x){return x!==i+1})).slice(0,2);var ops=shuf([co].concat(wr));qQs.push({tp:'next',q:T('\u00BFQu\u00E9 sigue?','\u0645\u0627 \u0627\u0644\u062A\u0627\u0644\u064A\u061F'),pr:A[i].ar,cn:co.n,ops:ops.map(function(o){return{t:o.ar,n:o.n}})});}
  for(var i=0;i<A.length;i++){var co=A[i];var wr=shuf(A.filter(function(_,x){return x!==i})).slice(0,2);var ops=shuf([co].concat(wr));qQs.push({tp:'mean',q:T('\u00BFSignificado?','\u0627\u0644\u0645\u0639\u0646\u0649\u061F'),pr:A[i].ar,cn:co.n,ops:ops.map(function(o){return{t:L==='es'?o.es:o.am,n:o.n}})});}
  qQs=shuf(qQs).slice(0,8);qi=0;qSc=0;qD=false;renQ();
}
function renQ(){
  var c=document.getElementById('qbox');
  if(qi>=qQs.length){var pc=Math.round(qSc/qQs.length*100);c.innerHTML='<div class="qr"><h3>'+T('\u00A1Resultado!','\u0627\u0644\u0646\u062A\u064A\u062C\u0629!')+'</h3><div class="big">'+pc+'%</div><p style="color:var(--dim);font-size:11px">'+qSc+'/'+qQs.length+'</p></div><button class="qnx" onclick="initQ()" style="margin-top:8px">\uD83D\uDD01</button>';return;}
  var q=qQs[qi];qD=false;var isMn=q.tp==='mean';
  c.innerHTML='<div class="qi">'+T('Pregunta','\u0633\u0624\u0627\u0644')+' '+(qi+1)+'/'+qQs.length+'</div><div class="qtp">'+(q.tp==='next'?T('Completa','\u0623\u0643\u0645\u0644'):T('Significado','\u0645\u0639\u0646\u0649'))+'</div><div class="qq">'+q.q+'</div><div class="qpr">'+q.pr+'</div><div class="qos">'+q.ops.map(function(o,i){return'<button class="qo '+(isMn?'mn':'')+(isMn&&L==='es'?' es':'')+'" id="qo'+i+'" onclick="qAn('+i+','+q.ops.map(function(x){return x.n}).indexOf(q.cn)+')">'+o.t+'</button>'}).join('')+'</div><div class="qfb" id="qFb"></div><button class="qnx" id="qNx" disabled onclick="qi++;renQ()">'+T('\u2192','\u2190')+'</button>';
}
function qAn(s,c){if(qD)return;qD=true;var fb=document.getElementById('qFb');document.querySelectorAll('#qbox .qo').forEach(function(o){o.classList.add('off')});document.getElementById('qo'+c).classList.add('ok');if(s===c){qSc++;fb.className='qfb sh g';fb.textContent=T('\u2705 \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647!','\u2705 \u0645\u0627 \u0634\u0627\u0621 \u0627\u0644\u0644\u0647!');addXP(12,document.getElementById('qo'+s));rBurst(document.getElementById('qo'+s));glowStar();}else{document.getElementById('qo'+s).classList.add('no');fb.className='qfb sh b';fb.textContent=T('\u274C','\u274C');}document.getElementById('qNx').disabled=false;}

    {i:'\uD83D\uDCC5',t:'\u0631\u0627\u062C\u0639',d:'\u0645\u0631\u0629/\u064A\u0648\u0645 \u00D7 \u0667 \u0623\u064A\u0627\u0645\u060C \u062B\u0645 \u0645\u0631\u0629/\u0623\u0633\u0628\u0648\u0639.'}

}
