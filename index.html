<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>مغامرة العاديات</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Baloo+Bhaijaan+2:wght@400;600;800&family=Lilita+One&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--g:#FFD700;--gd:#DAA520;--gl:#FFF8DC;--t:#00D9A6;--td:#00B88C;--sk:#64CFFF;--p:#A855F7;--pd:#7C3AED;--gr:#34D399;--r:#F87171;--o:#FB923C;--pk:#F472B6;--bg:#0A0E27;--bg2:#111640;--cd:#161B4A;--cd2:#1E2460;--tx:#E8EAFF;--dm:#7B83B5}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Fredoka','Baloo Bhaijaan 2',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;user-select:none}
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,#0A0E27,#1A1040 40%,#2D1B69 70%,#1A1040)}
.sky .s{position:absolute;inset:0;background-image:radial-gradient(2px 2px at 10% 15%,#fff 0%,transparent 100%),radial-gradient(2px 2px at 25% 35%,#FFD700 0%,transparent 100%),radial-gradient(1px 1px at 40% 10%,#fff 0%,transparent 100%),radial-gradient(2px 2px at 55% 45%,#fff 0%,transparent 100%),radial-gradient(1px 1px at 70% 20%,#FFD700 0%,transparent 100%),radial-gradient(2px 2px at 85% 30%,#fff 0%,transparent 100%);animation:tw 3s ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.4}100%{opacity:.8}}
#pc{position:fixed;inset:0;z-index:1;pointer-events:none}
.app{position:relative;z-index:2;max-width:480px;margin:0 auto;padding:10px;padding-bottom:20px}

/* Mascot */
.mas{text-align:center;padding:4px 0}
.sbox{display:inline-block;position:relative;animation:sfl 3s ease-in-out infinite}
@keyframes sfl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.sic{font-size:44px;filter:drop-shadow(0 0 10px rgba(255,215,0,.4));transition:all .5s}
.sbox.gl .sic{animation:sgl .3s ease 3}
@keyframes sgl{0%,100%{transform:scale(1)}50%{transform:scale(1.15) rotate(10deg)}}
.slb{position:absolute;bottom:-3px;right:-6px;background:linear-gradient(135deg,var(--p),var(--pk));color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:5px}
.snm{font-family:'Lilita One';font-size:13px;color:var(--g)}
.smo{font-size:9px;color:var(--dm)}

/* XP */
.xps{background:var(--cd);border-radius:11px;padding:7px 11px;margin:4px 0;border:1px solid rgba(255,255,255,.03)}
.xpt{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.xlv{font-family:'Lilita One';font-size:10px;color:var(--p)}
.xco{font-size:10px;color:var(--g);font-weight:600}
.xtr{height:6px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.xff{height:100%;background:linear-gradient(90deg,#A855F7,#EC4899,#F59E0B);border-radius:4px;transition:width .8s}
.xxt{font-size:8px;color:var(--dm);margin-top:1px;text-align:center}

/* Secret banner */
.sbr{display:none;background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(236,72,153,.08));border:1px solid rgba(168,85,247,.25);border-radius:8px;padding:7px 10px;margin:4px 0;text-align:center;font-size:9px;color:var(--pk);animation:fadeI .5s}
.sbr.sh{display:block}
@keyframes fadeI{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.cpop{position:fixed;z-index:200;pointer-events:none;font-size:13px;font-weight:700;color:var(--g);text-shadow:0 0 6px rgba(255,215,0,.5);animation:cup 1s ease-out forwards}
@keyframes cup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-45px)}}

/* Tabs */
.lr{display:flex;justify-content:center;gap:4px;margin:4px 0}
.lbt{padding:4px 13px;border-radius:11px;border:2px solid rgba(255,255,255,.04);background:transparent;color:var(--dm);font-family:'Fredoka';font-size:11px;cursor:pointer;transition:all .3s}
.lbt.a{background:var(--t);color:#fff;border-color:var(--t)}
.tabs{display:flex;gap:3px;margin:5px 0;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tbt{flex-shrink:0;padding:6px 9px;border-radius:8px;border:none;background:var(--cd);color:var(--dm);font-family:'Fredoka';font-size:10px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.tbt.a{background:var(--p);color:#fff;box-shadow:0 2px 8px rgba(168,85,247,.25)}
.sec{display:none;animation:fadeI .3s}.sec.a{display:block}

/* Cards */
.ac{background:var(--cd);border-radius:11px;padding:11px;margin-bottom:6px;border:2px solid transparent;transition:all .3s;position:relative}
.ac.pl{border-color:var(--t);box-shadow:0 0 12px rgba(0,217,166,.08)}
.aynum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:linear-gradient(135deg,var(--g),var(--o));color:#fff;border-radius:50%;font-weight:700;font-size:9px;margin-bottom:3px}
.ayar{font-family:'Amiri',serif;font-size:21px;line-height:1.8;color:var(--gl);text-align:right;direction:rtl;margin-bottom:3px}
.ayar .w{display:inline;cursor:pointer;padding:0 1px;transition:color .15s,text-shadow .15s;border-bottom:2px solid transparent}
.ayar .w:hover{border-bottom-color:var(--t)}
.ayar .w.hi{color:var(--g)!important;text-shadow:0 0 10px rgba(255,215,0,.5)}
.aytl{font-size:10px;color:var(--sk);margin-bottom:2px;direction:ltr;text-align:left;font-style:italic}
.aymn{font-size:10px;color:var(--dm);line-height:1.3}
.aymn.es{direction:ltr;text-align:left}.aymn.ar{direction:rtl;text-align:right;font-family:'Baloo Bhaijaan 2'}
.btns{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.bt{padding:4px 7px;border-radius:6px;border:none;font-family:'Fredoka';font-size:9px;cursor:pointer;display:flex;align-items:center;gap:2px;color:#fff;transition:all .2s}
.bt:active{transform:scale(.92)}
.bt1{background:var(--t)}.bt2{background:linear-gradient(135deg,var(--p),var(--pk))}.bt3{background:var(--pd)}.bt4{background:var(--o)}.bt5{background:var(--gr)}.bt6{background:var(--gd)}
.rrec{display:flex;gap:3px;margin-bottom:5px;justify-content:center}
.rbt{padding:2px 7px;border-radius:7px;border:1px solid rgba(255,255,255,.04);background:transparent;color:var(--dm);font-family:'Fredoka';font-size:9px;cursor:pointer}
.rbt.a{background:var(--gd);color:#fff;border-color:var(--gd)}

/* Word game */
.wg{margin-top:6px;padding:8px;background:var(--bg2);border-radius:9px;border:2px solid var(--p)}
.wgt{font-size:9px;color:var(--p);font-weight:600;margin-bottom:5px;text-align:center}
.wgsl{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;min-height:30px;padding:5px;background:rgba(255,255,255,.02);border-radius:5px;margin-bottom:5px;direction:rtl}
.wgs{padding:4px 8px;background:var(--cd);border:2px dashed rgba(255,255,255,.06);border-radius:6px;font-family:'Amiri',serif;font-size:14px;color:var(--gl);cursor:pointer}
.wgs:hover{border-color:var(--r)}
.wgpl{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;direction:rtl}
.wgw{padding:4px 8px;background:var(--cd2);border:2px solid rgba(255,255,255,.05);border-radius:6px;font-family:'Amiri',serif;font-size:14px;color:var(--tx);cursor:pointer;transition:all .2s}
.wgw:hover{border-color:var(--t);transform:scale(1.03)}
.wgw.u{opacity:.12;pointer-events:none}
.wgfb{text-align:center;margin-top:5px;font-size:10px;font-weight:600;padding:5px;border-radius:5px;display:none}
.wgfb.sh{display:block}.wgfb.g{background:rgba(52,211,153,.07);color:var(--gr)}.wgfb.b{background:rgba(248,113,113,.07);color:var(--r)}
.wgck{display:block;margin:5px auto 0;padding:4px 14px;border-radius:5px;border:none;background:var(--p);color:#fff;font-family:'Fredoka';font-size:9px;font-weight:600;cursor:pointer}
.wgck:disabled{opacity:.2}
.wgsp{text-align:center;margin-top:3px;font-size:9px;color:var(--o);font-weight:600;display:none}
.wgsp.sh{display:block;animation:fadeI .3s}

/* Fill the gap game */
.fg{margin-top:6px;padding:8px;background:var(--bg2);border-radius:9px;border:2px solid var(--t)}
.fgt{font-size:9px;color:var(--t);font-weight:600;margin-bottom:5px;text-align:center}
.fgay{font-family:'Amiri',serif;font-size:18px;color:var(--gl);text-align:center;direction:rtl;line-height:1.8;margin-bottom:6px}
.fgay .gap{display:inline-block;min-width:50px;border-bottom:2px dashed var(--o);color:var(--o);padding:0 4px;cursor:default}
.fgos{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;direction:rtl}
.fgo{padding:4px 10px;background:var(--cd2);border:2px solid rgba(255,255,255,.05);border-radius:6px;font-family:'Amiri',serif;font-size:14px;color:var(--tx);cursor:pointer;transition:all .2s}
.fgo:hover{border-color:var(--t)}
.fgo.ok{border-color:var(--gr)!important;background:rgba(52,211,153,.08)!important;pointer-events:none}
.fgo.no{border-color:var(--r)!important;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fgo.off{pointer-events:none;opacity:.3}
.fgfb{text-align:center;margin-top:4px;font-size:10px;font-weight:600;display:none}
.fgfb.sh{display:block}.fgfb.g{color:var(--gr)}.fgfb.b{color:var(--r)}

/* Chain practice */
.chain{background:var(--cd);border-radius:11px;padding:12px;margin-bottom:8px;border:2px solid var(--gd)}
.chain-t{font-family:'Lilita One';font-size:13px;color:var(--g);text-align:center;margin-bottom:6px}
.chain-prog{display:flex;gap:3px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.chain-dot{width:18px;height:18px;border-radius:50%;background:var(--bg2);border:2px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--dm);transition:all .3s}
.chain-dot.done{background:var(--gr);border-color:var(--gr);color:#fff}
.chain-dot.cur{background:var(--g);border-color:var(--g);color:var(--bg);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.3)}50%{box-shadow:0 0 0 6px rgba(255,215,0,0)}}
.chain-q{font-family:'Amiri',serif;font-size:20px;color:var(--gl);text-align:center;direction:rtl;line-height:1.7;padding:10px;background:var(--bg2);border-radius:8px;margin-bottom:8px}
.chain-os{display:flex;flex-direction:column;gap:4px}
.chain-o{padding:8px 12px;background:var(--cd2);border:2px solid rgba(255,255,255,.04);border-radius:8px;color:var(--tx);font-family:'Amiri',serif;font-size:15px;cursor:pointer;text-align:right;direction:rtl;transition:all .2s;line-height:1.4}
.chain-o:hover{border-color:var(--t)}
.chain-o.ok{border-color:var(--gr)!important;background:rgba(52,211,153,.08)!important;pointer-events:none}
.chain-o.no{border-color:var(--r)!important;background:rgba(248,113,113,.06)!important;animation:shake .3s;pointer-events:none}
.chain-o.off{pointer-events:none;opacity:.3}
.chain-fb{text-align:center;margin-top:5px;font-size:10px;font-weight:600;padding:5px;border-radius:5px;display:none}
.chain-fb.sh{display:block}.chain-fb.g{background:rgba(52,211,153,.06);color:var(--gr)}.chain-fb.b{background:rgba(248,113,113,.06);color:var(--r)}

/* Adventure nodes */
.avst{background:var(--cd);border-radius:11px;padding:11px;margin-bottom:7px;border:1px solid rgba(255,215,0,.08);position:relative;overflow:hidden}
.avst::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--g),var(--o),var(--p))}
.avnr{font-size:11px;line-height:1.6;color:var(--tx)}
.avnr.ar{direction:rtl;text-align:right;font-family:'Baloo Bhaijaan 2'}
.avnr .hl{color:var(--g);font-weight:600}
.avch{font-family:'Lilita One';font-size:13px;color:var(--g);text-align:center;margin-bottom:2px}
.avnd{background:var(--cd2);border-radius:9px;padding:9px;margin-bottom:4px;border:2px solid rgba(255,255,255,.03);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:8px}
.avnd:hover{border-color:var(--t)}
.avnd.lk{opacity:.25;cursor:not-allowed}
.avnd.cu{border-color:var(--g);box-shadow:0 0 10px rgba(255,215,0,.15);animation:np 2s infinite}
@keyframes np{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.15)}50%{box-shadow:0 0 18px rgba(255,215,0,.3)}}
.avnd.dn{border-color:var(--gr);opacity:.7}
.avnd-ic{font-size:20px;flex-shrink:0;width:34px;height:34px;background:var(--bg2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.avnd-i{flex:1}
.avnd-t{font-family:'Lilita One';font-size:11px;color:var(--gl)}
.avnd.dn .avnd-t{color:var(--gr)}
.avnd-s{font-size:8px;color:var(--dm)}
.avnd-st{display:flex;gap:2px}.avnd-st span{font-size:9px;opacity:.2}.avnd-st span.on{opacity:1}

/* Modal */
.mdl{display:none;position:fixed;inset:0;background:rgba(10,14,39,.96);z-index:100;align-items:center;justify-content:center;padding:10px}
.mdl.sh{display:flex}
.mdlb{background:var(--cd);border-radius:14px;padding:16px;max-width:420px;width:100%;border:2px solid var(--gd);position:relative;max-height:93vh;overflow-y:auto}
.mdlx{position:absolute;top:5px;right:8px;background:none;border:none;color:var(--dm);font-size:18px;cursor:pointer;z-index:5}
.mdlt{font-family:'Lilita One';font-size:14px;color:var(--g);text-align:center;margin-bottom:2px}
.mdls{font-size:10px;color:var(--dm);text-align:center;margin-bottom:6px}
.mdlar{font-family:'Amiri',serif;font-size:22px;color:var(--gl);text-align:center;direction:rtl;line-height:1.7;margin-bottom:6px;padding:8px;background:var(--bg2);border-radius:8px}
.msn{display:flex;align-items:center;gap:7px;padding:7px;background:var(--bg2);border-radius:7px;border:2px solid transparent;cursor:pointer;transition:all .3s;margin-bottom:4px}
.msn.d{border-color:var(--gr);opacity:.55}
.msn-ic{font-size:18px;flex-shrink:0}
.msn-tx{font-size:10px;color:var(--tx);line-height:1.2}
.msn-rw{font-size:8px;color:var(--g)}
.mdla{margin-top:6px}

/* Mini quiz in modal */
.mqos{display:flex;flex-direction:column;gap:4px;margin:6px 0}
.mqo{padding:7px 10px;background:var(--cd2);border:2px solid rgba(255,255,255,.03);border-radius:7px;color:var(--tx);font-size:12px;cursor:pointer;transition:all .2s;text-align:right;direction:rtl;font-family:'Amiri',serif;line-height:1.3}
.mqo.mn{font-family:'Fredoka';font-size:10px}.mqo.mn.es{direction:ltr;text-align:left}
.mqo.ok{border-color:var(--gr)!important;background:rgba(52,211,153,.06)!important}
.mqo.no{border-color:var(--r)!important;background:rgba(248,113,113,.06)!important;animation:shake .3s}
.mqo.off{pointer-events:none;opacity:.3}
.mqfb{padding:5px;border-radius:5px;margin:4px 0;font-size:10px;font-weight:600;text-align:center;display:none}
.mqfb.sh{display:block}.mqfb.g{background:rgba(52,211,153,.06);color:var(--gr)}.mqfb.b{background:rgba(248,113,113,.06);color:var(--r)}

/* Guided lesson */
.guided{text-align:center}
.gstep{background:var(--cd);border-radius:12px;padding:14px;margin-bottom:8px;border:2px solid var(--p)}
.gstep-n{font-family:'Lilita One';font-size:12px;color:var(--p);margin-bottom:4px}
.gstep-t{font-size:11px;color:var(--tx);margin-bottom:8px;line-height:1.5}
.gstep-ar{font-family:'Amiri',serif;font-size:22px;color:var(--gl);direction:rtl;line-height:1.8;margin-bottom:8px}
.gbtn{padding:8px 20px;border-radius:8px;border:none;background:var(--p);color:#fff;font-family:'Fredoka';font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.gbtn:active{transform:scale(.95)}
.gbtn.teal{background:var(--t)}
.gbtn.gold{background:var(--gd)}
.gbtn:disabled{opacity:.3}
.gprog{display:flex;gap:3px;justify-content:center;margin-bottom:10px}
.gprog span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1)}
.gprog span.done{background:var(--gr)}
.gprog span.cur{background:var(--g);animation:pulse 1.5s infinite}

/* Tafsir */
.tc{background:var(--cd);border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid rgba(255,255,255,.02)}
.tayah{font-family:'Amiri',serif;font-size:18px;color:var(--gl);text-align:right;margin-bottom:5px;line-height:1.6;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.02)}
.ttxt{font-size:10px;line-height:1.5;color:var(--tx)}
.ttxt.es{direction:ltr;text-align:left}.ttxt.ar{direction:rtl;text-align:right;font-family:'Baloo Bhaijaan 2'}
.ttxt .kw{color:var(--g);font-weight:600}
.ttxt .eb{font-size:20px;display:block;text-align:center;margin:2px 0}
.aibtn{display:inline-flex;align-items:center;gap:2px;margin-top:5px;padding:4px 7px;background:linear-gradient(135deg,var(--p),#6C3AED);border:none;border-radius:5px;color:#fff;font-family:'Fredoka';font-size:8px;cursor:pointer}
.aibx{display:none;margin-top:5px}.aibx.sh{display:block;animation:fadeI .3s}
.airow{display:flex;gap:3px}
.aiin{flex:1;padding:5px 7px;border-radius:5px;border:1px solid rgba(255,255,255,.05);background:var(--bg);color:var(--tx);font-family:'Fredoka';font-size:9px;outline:none}
.aigo{padding:5px 8px;border-radius:5px;border:none;background:var(--p);color:#fff;font-size:11px;cursor:pointer}
.aiout{margin-top:4px;padding:6px;background:rgba(168,85,247,.05);border:1px solid rgba(168,85,247,.08);border-radius:5px;font-size:9px;line-height:1.4;display:none}
.aiout.sh{display:block}
.sp{width:10px;height:10px;border:2px solid var(--t);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Quiz */
.qbox{text-align:center}
.qinf{font-size:9px;color:var(--dm);margin-bottom:4px}
.qtyp{display:inline-block;padding:2px 6px;border-radius:4px;background:rgba(168,85,247,.1);color:var(--p);font-size:8px;font-weight:600;margin-bottom:2px}
.qqt{color:var(--sk);font-size:11px;margin-bottom:2px}
.qpr{font-family:'Amiri',serif;font-size:19px;color:var(--gl);padding:10px;margin:4px 0;background:var(--cd);border-radius:8px;direction:rtl;display:flex;align-items:center;justify-content:center;line-height:1.5}
.qos{display:flex;flex-direction:column;gap:4px;margin:6px 0}
.qo{padding:7px 10px;background:var(--cd);border:2px solid rgba(255,255,255,.03);border-radius:7px;color:var(--tx);font-size:12px;cursor:pointer;transition:all .2s;text-align:right;direction:rtl;font-family:'Amiri',serif;line-height:1.3}
.qo.mn{font-family:'Fredoka';font-size:10px}.qo.mn.es{direction:ltr;text-align:left}
.qo.ok{border-color:var(--gr)!important;background:rgba(52,211,153,.06)!important}
.qo.no{border-color:var(--r)!important;background:rgba(248,113,113,.06)!important;animation:shake .3s}
.qo.off{pointer-events:none;opacity:.3}
.qfb{padding:5px;border-radius:5px;margin:4px 0;font-size:10px;font-weight:600;text-align:center;display:none}
.qfb.sh{display:block}.qfb.g{background:rgba(52,211,153,.05);color:var(--gr)}.qfb.b{background:rgba(248,113,113,.05);color:var(--r)}
.qnx{padding:5px 15px;border-radius:6px;border:none;background:var(--p);color:#fff;font-family:'Fredoka';font-size:10px;font-weight:600;cursor:pointer}.qnx:disabled{opacity:.2}
.qres{padding:14px;background:var(--cd);border-radius:10px;border:2px solid var(--g);margin:6px 0}.qres h3{color:var(--g);font-size:13px}.qres .big{font-size:32px;font-weight:800;color:var(--t)}

/* Shop */
.shi{background:var(--cd);border-radius:11px;padding:11px;margin-bottom:8px;text-align:center;border:1px solid rgba(255,215,0,.08)}
.shi h3{font-family:'Lilita One';font-size:14px;color:var(--g);margin-bottom:3px}
.shi p{font-size:10px;color:var(--dm);line-height:1.4}
.scat{font-family:'Lilita One';font-size:11px;color:var(--p);margin:8px 0 4px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sitm{background:var(--cd);border-radius:10px;padding:10px;text-align:center;border:2px solid rgba(255,255,255,.02);cursor:pointer;transition:all .3s}
.sitm:hover{border-color:var(--g)}
.sitm.got{border-color:var(--gr);opacity:.65}
.sitm.cant{opacity:.3}
.sitm-ic{font-size:24px;margin-bottom:3px}
.sitm-nm{font-size:10px;color:var(--gl);font-weight:600;margin-bottom:1px}
.sitm-ds{font-size:8px;color:var(--dm);margin-bottom:3px;line-height:1.2}
.sitm-pr{font-size:10px;color:var(--g);font-weight:700}
.sitm.got .sitm-pr{color:var(--gr)}
.exlk{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.1);border-radius:8px;padding:8px;margin-top:6px;font-size:10px;color:var(--r);text-align:center;line-height:1.3}

/* Treasure popup */
.tpop{display:none;position:fixed;inset:0;background:rgba(10,14,39,.97);z-index:150;align-items:center;justify-content:center;padding:12px}
.tpop.sh{display:flex}
.tpopb{background:var(--cd);border-radius:16px;padding:18px;max-width:360px;width:100%;border:2px solid var(--g);text-align:center;max-height:90vh;overflow-y:auto}
.tpic{font-size:44px;margin-bottom:6px;animation:bounce .8s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.tpt{font-family:'Lilita One';font-size:16px;color:var(--g);margin-bottom:3px}
.tpd{font-size:11px;color:var(--tx);line-height:1.5;margin-bottom:5px}
.tpd.ar{direction:rtl;font-family:'Baloo Bhaijaan 2'}
.tpbt{padding:7px 18px;background:var(--t);color:#fff;border:none;border-radius:8px;font-family:'Fredoka';font-size:12px;font-weight:600;cursor:pointer;margin-top:6px}

/* Method */
.mcard{background:var(--cd);border-radius:10px;padding:10px;margin-bottom:6px}
.mstp{display:flex;gap:7px;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02)}.mstp:last-child{border:none}
.msic{flex-shrink:0;width:24px;height:24px;background:linear-gradient(135deg,var(--p),var(--t));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.msbd h4{color:var(--g);font-size:11px;margin-bottom:1px}.msbd p{color:var(--dm);font-size:9px;line-height:1.3}

/* Celebration */
.clb{position:fixed;inset:0;background:rgba(10,14,39,.96);z-index:200;display:none;align-items:center;justify-content:center}
.clb.sh{display:flex}
.clbi{text-align:center;padding:15px}
.clbic{font-size:44px;animation:bounce .8s infinite}
.clb h2{font-family:'Lilita One';font-size:18px;color:var(--g);margin:6px 0 2px}
.clb p{color:var(--dm);font-size:11px;margin-bottom:10px}
.clbbtn{padding:7px 18px;background:var(--t);color:#fff;border:none;border-radius:8px;font-family:'Fredoka';font-size:11px;font-weight:600;cursor:pointer}
@media(max-width:380px){.ayar{font-size:18px}.sic{font-size:36px}.tbt{font-size:8px;padding:4px 6px}}
</style>

var AY=[
{n:1,a:"\u0648\u064e\u0627\u0644\u0652\u0639\u064e\u0627\u062f\u0650\u064a\u064e\u0627\u062a\u0650 \u0636\u064e\u0628\u0652\u062d\u064b\u0627",w:["\u0648\u064e\u0627\u0644\u0652\u0639\u064e\u0627\u062f\u0650\u064a\u064e\u0627\u062a\u0650","\u0636\u064e\u0628\u0652\u062d\u064b\u0627"],t:"Ual-aadiyaati dabja",e:"\u00a1Por los que corren jadeando!",m:"\u0623\u0642\u0633\u0645 \u0628\u0627\u0644\u062a\u064a \u062a\u062c\u0631\u064a \u0648\u062a\u062a\u0646\u0641\u0633 \u0628\u0635\u0648\u062a",xE:"Allah jura por los <span class='kw'>guerreros que corren</span> tan fuerte que jadean. <span class='eb'>\ud83d\udca8</span>",xA:"\u0627\u0644\u0644\u0647 \u064a\u0642\u0633\u0645 \u0628\u0627\u0644\u0639\u0627\u062f\u064a\u0627\u062a \u0627\u0644\u062a\u064a \u062a\u062c\u0631\u064a \u0648\u062a\u0644\u0647\u062b. <span class='eb'>\ud83d\udca8</span>",ic:"\ud83c\udf05",sc:"El Inicio",sE:"Estamos en el desierto al amanecer. <span class='hl'>Un sonido fuerte rompe el silencio</span>: algo corre con toda su fuerza...",sA:"\u0646\u062d\u0646 \u0641\u064a \u0627\u0644\u0635\u062d\u0631\u0627\u0621 \u0639\u0646\u062f \u0627\u0644\u0641\u062c\u0631. <span class='hl'>\u0635\u0648\u062a \u0642\u0648\u064a \u064a\u0643\u0633\u0631 \u0627\u0644\u0635\u0645\u062a</span>...",uQ:["Algo que corre r\u00e1pido|Algo que duerme|Algo que vuela","\u064a\u0631\u0643\u0636 \u0628\u0633\u0631\u0639\u0629|\u064a\u0646\u0627\u0645|\u064a\u0637\u064a\u0631"],uC:0},
{n:2,a:"\u0641\u064e\u0627\u0644\u0652\u0645\u064f\u0648\u0631\u0650\u064a\u064e\u0627\u062a\u0650 \u0642\u064e\u062f\u0652\u062d\u064b\u0627",w:["\u0641\u064e\u0627\u0644\u0652\u0645\u064f\u0648\u0631\u0650\u064a\u064e\u0627\u062a\u0650","\u0642\u064e\u062f\u0652\u062d\u064b\u0627"],t:"Fal-muriyaati qadja",e:"\u00a1Hacen saltar chispas!",m:"\u062a\u062e\u0631\u062c \u0634\u0631\u0627\u0631\u0627\u064b \u0645\u0646 \u062d\u0648\u0627\u0641\u0631\u0647\u0627",xE:"Sus <span class='kw'>cascos hacen chispas</span> al golpear las rocas. <span class='eb'>\ud83d\udd25\u2728</span>",xA:"<span class='kw'>\u062d\u0648\u0627\u0641\u0631\u0647\u0627 \u062a\u062e\u0631\u062c \u0634\u0631\u0627\u0631\u0627\u062a</span>. <span class='eb'>\ud83d\udd25\u2728</span>",ic:"\ud83d\udd25",sc:"Las Chispas",sE:"Sobre las piedras, <span class='hl'>chispas de fuego saltan</span> como estrellas fugaces...",sA:"\u0639\u0644\u0649 \u0627\u0644\u062d\u062c\u0627\u0631\u0629\u060c <span class='hl'>\u062a\u062a\u0637\u0627\u064a\u0631 \u0634\u0631\u0627\u0631\u0627\u062a</span>...",uQ:["Chispas de fuego|Flores|Agua","\u0634\u0631\u0627\u0631\u0627\u062a|\u0632\u0647\u0648\u0631|\u0645\u0627\u0621"],uC:0},
{n:3,a:"\u0641\u064e\u0627\u0644\u0652\u0645\u064f\u063a\u0650\u064a\u0631\u064e\u0627\u062a\u0650 \u0635\u064f\u0628\u0652\u062d\u064b\u0627",w:["\u0641\u064e\u0627\u0644\u0652\u0645\u064f\u063a\u0650\u064a\u0631\u064e\u0627\u062a\u0650","\u0635\u064f\u0628\u0652\u062d\u064b\u0627"],t:"Fal-mugiraati subja",e:"\u00a1Atacan al amanecer!",m:"\u062a\u063a\u064a\u0631 \u0648\u0642\u062a \u0627\u0644\u0635\u0628\u0627\u062d",xE:"<span class='kw'>Atacaban al amanecer</span>. <span class='eb'>\ud83c\udf05\u2694\ufe0f</span>",xA:"<span class='kw'>\u062a\u0647\u062c\u0645 \u0639\u0646\u062f \u0627\u0644\u0641\u062c\u0631</span>. <span class='eb'>\ud83c\udf05\u2694\ufe0f</span>",ic:"\u2694\ufe0f",sc:"El Amanecer",sE:"El sol asoma. <span class='hl'>Es el momento perfecto para atacar</span>.",sA:"\u0627\u0644\u0634\u0645\u0633 \u062a\u0638\u0647\u0631. <span class='hl'>\u0627\u0644\u0648\u0642\u062a \u0627\u0644\u0645\u062b\u0627\u0644\u064a \u0644\u0644\u0647\u062c\u0648\u0645</span>.",uQ:["Al amanecer|A medianoche|Al atardecer","\u0639\u0646\u062f \u0627\u0644\u0641\u062c\u0631|\u0645\u0646\u062a\u0635\u0641 \u0627\u0644\u0644\u064a\u0644|\u0627\u0644\u063a\u0631\u0648\u0628"],uC:0},
{n:4,a:"\u0641\u064e\u0623\u064e\u062b\u064e\u0631\u0652\u0646\u064e \u0628\u0650\u0647\u0650 \u0646\u064e\u0642\u0652\u0639\u064b\u0627",w:["\u0641\u064e\u0623\u064e\u062b\u064e\u0631\u0652\u0646\u064e","\u0628\u0650\u0647\u0650","\u0646\u064e\u0642\u0652\u0639\u064b\u0627"],t:"Fa-azarna bihi naq-a",e:"\u00a1Levantan polvo!",m:"\u0623\u062b\u0627\u0631\u062a \u063a\u0628\u0627\u0631\u0627\u064b \u0643\u062b\u064a\u0641\u0627\u064b",xE:"Corren tan fuerte que <span class='kw'>levantan nubes de polvo</span>. <span class='eb'>\ud83c\udf2b\ufe0f</span>",xA:"\u062a\u0631\u0643\u0636 \u062d\u062a\u0649 <span class='kw'>\u062a\u062b\u064a\u0631 \u063a\u0628\u0627\u0631\u0627\u064b</span>. <span class='eb'>\ud83c\udf2b\ufe0f</span>",ic:"\ud83c\udf2b\ufe0f",sc:"La Tormenta",sE:"Una <span class='hl'>nube de polvo enorme</span> cubre el horizonte.",sA:"<span class='hl'>\u0633\u062d\u0627\u0628\u0629 \u063a\u0628\u0627\u0631 \u0636\u062e\u0645\u0629</span> \u062a\u063a\u0637\u064a \u0627\u0644\u0623\u0641\u0642.",uQ:["Nubes de polvo|Nieve|Lluvia","\u063a\u0628\u0627\u0631|\u062b\u0644\u062c|\u0645\u0637\u0631"],uC:0},
{n:5,a:"\u0641\u064e\u0648\u064e\u0633\u064e\u0637\u0652\u0646\u064e \u0628\u0650\u0647\u0650 \u062c\u064e\u0645\u0652\u0639\u064b\u0627",w:["\u0641\u064e\u0648\u064e\u0633\u064e\u0637\u0652\u0646\u064e","\u0628\u0650\u0647\u0650","\u062c\u064e\u0645\u0652\u0639\u064b\u0627"],t:"Fa-uasatna bihi yam-a",e:"\u00a1Penetran entre los enemigos!",m:"\u062f\u062e\u0644\u062a \u0648\u0633\u0637 \u0627\u0644\u0623\u0639\u062f\u0627\u0621",xE:"Entran <span class='kw'>en medio de los enemigos</span> sin miedo. <span class='eb'>\u26a1\ud83d\udee1\ufe0f</span>",xA:"\u062a\u062f\u062e\u0644 <span class='kw'>\u0648\u0633\u0637 \u0627\u0644\u0623\u0639\u062f\u0627\u0621</span>. <span class='eb'>\u26a1\ud83d\udee1\ufe0f</span>",ic:"\ud83d\udee1\ufe0f",sc:"La Batalla",sE:"<span class='hl'>Sin dudar, entran al centro</span>. Pero \u00bfpor qu\u00e9 nos cuenta Allah esto?",sA:"<span class='hl'>\u0628\u062f\u0648\u0646 \u062a\u0631\u062f\u062f</span>. \u0644\u0643\u0646 \u0644\u0645\u0627\u0630\u0627 \u064a\u062e\u0628\u0631\u0646\u0627 \u0627\u0644\u0644\u0647\u061f",uQ:["En medio de los enemigos|En una cueva|En el mar","\u0648\u0633\u0637 \u0627\u0644\u0623\u0639\u062f\u0627\u0621|\u0641\u064a \u0643\u0647\u0641|\u0641\u064a \u0627\u0644\u0628\u062d\u0631"],uC:0},

    {n:T('Paso 3: Significado','\u0627\u0644\u062e\u0637\u0648\u0629 \u0663: \u0627\u0644\u0645\u0639\u0646\u0649'),t:T('Lee qu\u00e9 significa:','\u0627\u0642\u0631\u0623 \u0645\u0627\u0630\u0627 \u062a\u0639\u0646\u064a:'),act:'meaning'},
    {n:T('Paso 4: Ordena','\u0627\u0644\u062e\u0637\u0648\u0629 \u0664: \u0631\u062a\u0651\u0628'),t:T('\u00bfPuedes ordenar las palabras?','\u0647\u0644 \u062a\u0633\u062a\u0637\u064a\u0639 \u062a\u0631\u062a\u064a\u0628 \u0627\u0644\u0643\u0644\u0645\u0627\u062a\u061f'),act:'order'},
    {n:T('Paso 5: Completa','\u0627\u0644\u062e\u0637\u0648\u0629 \u0665: \u0623\u0643\u0645\u0644'),t:T('Completa la palabra que falta:','\u0623\u0643\u0645\u0644 \u0627\u0644\u0643\u0644\u0645\u0629 \u0627\u0644\u0646\u0627\u0642\u0635\u0629:'),act:'fill'}
  ];

  } else if(guidedStep===1){
    h+='<button class="gbtn" onclick="guidedSlow()">🐢 '+T('Escuchar lento','\u0627\u0633\u062a\u0645\u0639 \u0628\u0628\u0637\u0621')+'</button>';

    h+='<div id="gFill"></div>';

function guidedListen(){playAu(guidedAyah,1,function(){guidedStep=1;sv();renderGuided();});}

function showGuidedWordGame(ay){
  var el=document.getElementById('gWog');

  function render(){
    el.innerHTML='<div class="wg"><div class="wgt">'+T('Toca las palabras en orden correcto','\u0627\u0636\u063a\u0637 \u0627\u0644\u0643\u0644\u0645\u0627\u062a \u0628\u0627\u0644\u062a\u0631\u062a\u064a\u0628')+'</div>'
      +'<div class="wgsl">'+selected.map(function(w,i){return'<div class="wgs" onclick="gWogRm('+i+')">'+w+'</div>'}).join('')+(selected.length<ay.w.length?'<div class="wgs" style="opacity:.2">?</div>':'')+'</div>'
      +'<div class="wgpl">'+shuffled.map(function(w){var cnt=selected.filter(function(x){return x===w}).length;var avail=shuffled.filter(function(x){return x===w}).length;return'<div class="wgw'+(cnt>=avail?' u':'')+'" onclick="gWogAdd(\''+encodeURIComponent(w)+'\')">'+w+'</div>'}).join('')+'</div>'
      +'<button class="wgck" '+(selected.length<ay.w.length?'disabled':'')+' onclick="gWogCk()">'+T('Comprobar','\u062a\u062d\u0642\u0642')+'</button>'

function gWogAdd(enc){var w=decodeURIComponent(enc);var g=window._gw;if(g.sl.length>=g.ay.w.length)return;g.sl.push(w);g.r();}
function gWogRm(i){window._gw.sl.splice(i,1);window._gw.r();}
function gWogCk(){

  else{fb.className='wgfb sh b';fb.textContent=T('\u274c Int\u00e9ntalo','\u274c \u062d\u0627\u0648\u0644');g.sl=[];setTimeout(function(){g.r()},800);}

// Fill the gap for guided mode
function showGuidedFill(ay){
  var el=document.getElementById('gFill');
  if(ay.w.length<2){guidedStep=0;guidedAyah++;sv();renderGuided();return;}
  var gapIdx=~~(Math.random()*ay.w.length);
  var correct=ay.w[gapIdx];
  var wrongs=shuf(AY.filter(function(x){return x.n!==ay.n}).reduce(function(a,x){return a.concat(x.w)},[]).filter(function(x){return x!==correct})).slice(0,2);
  var opts=shuf([correct].concat(wrongs));
  var display=ay.w.map(function(w,i){return i===gapIdx?'<span class="gap">___</span>':w}).join(' ');

  el.innerHTML='<div class="fg"><div class="fgt">'+T('Completa la palabra que falta','\u0623\u0643\u0645\u0644 \u0627\u0644\u0643\u0644\u0645\u0629 \u0627\u0644\u0646\u0627\u0642\u0635\u0629')+'</div>'
    +'<div class="fgay">'+display+'</div>'
    +'<div class="fgos">'+opts.map(function(o,i){return'<div class="fgo" id="gf'+i+'" onclick="gFillAns('+i+','+opts.indexOf(correct)+')">'+o+'</div>'}).join('')+'</div>'
    +'<div class="fgfb" id="gFillFb"></div></div>';
}
function gFillAns(s,c){
  document.querySelectorAll('#gFill .fgo').forEach(function(o){o.classList.add('off')});

    fb.className='fgfb sh g';fb.textContent=T('\u2705 \u00a1Siguiente ayah!','\u2705 \u0627\u0644\u0622\u064a\u0629 \u0627\u0644\u062a\u0627\u0644\u064a\u0629!');
    doRw(10,guidedAyah,'guided_fill');glS();
    guidedStep=0;guidedAyah++;sv();
    setTimeout(renderGuided,1000);
  } else {
    document.getElementById('gf'+s).classList.add('no');
    fb.className='fgfb sh b';fb.textContent=T('\u274c Escucha otra vez','\u274c \u0627\u0633\u062a\u0645\u0639 \u0645\u0631\u0629 \u0623\u062e\u0631\u0649');
    // Designed trap: on fail, auto-play the ayah (learning through failure)
    setTimeout(function(){playAu(guidedAyah,0.8,function(){showGuidedFill(AY[guidedAyah-1])});},1000);

}

function showWG(n){

  function render(){
    el.innerHTML='<div class="wg"><div class="wgt">'+T('Ordena las palabras','\u0631\u062a\u0651\u0628 \u0627\u0644\u0643\u0644\u0645\u0627\u062a')+'</div>'

      +'<div class="wgpl">'+shuffled.map(function(w){var c=selected.filter(function(x){return x===w}).length;var a=shuffled.filter(function(x){return x===w}).length;return'<div class="wgw'+(c>=a?' u':'')+'" onclick="wgAd('+n+',\''+encodeURIComponent(w)+'\')">'+w+'</div>'}).join('')+'</div>'
      +'<button class="wgck" '+(selected.length<ay.w.length?'disabled':'')+' onclick="wgCk('+n+')">'+T('Comprobar','\u062a\u062d\u0642\u0642')+'</button>'

function wgAd(n,enc){var w=decodeURIComponent(enc);var g=window['_wg'+n];if(!g||g.sl.length>=g.ay.w.length)return;g.sl.push(w);g.r();}
function wgRm(n,i){var g=window['_wg'+n];if(!g)return;g.sl.splice(i,1);g.r();}
function wgCk(n){
  var g=window['_wg'+n];if(!g)return;
  var ok=g.sl.every(function(w,i){return w===g.ay.w[i]});
  var fb=document.getElementById('wgFb'+n);
  if(ok){
    var elapsed=((Date.now()-g.st)/1000).toFixed(1);
    fb.className='wgfb sh g';fb.textContent=T('\u2705 Perfecto!','\u2705 \u0645\u0645\u062a\u0627\u0632!')+' ('+elapsed+'s)';
    doRw(12,n,'wordgame');glS();rB(document.getElementById('ay'+n));
    // Speed bonus (designed trap: incentivizes repetition)
    var prev=spd[n]||999;
    if(+elapsed<prev){spd[n]=+elapsed;sv();}
    if(+elapsed<8){
      var sp=document.getElementById('wgSp'+n);
      sp.className='wgsp sh';sp.textContent=T('\u26a1 VELOCIDAD! Bonus +5','⚡ \u0633\u0631\u0639\u0629! +\u0665');
      if(canRw(n,'speed'))doRw(5,n,'speed');
    }
    setTimeout(function(){document.getElementById('wg'+n).innerHTML='';},1500);
  } else {
    fb.className='wgfb sh b';fb.textContent=T('\u274c Mira el orden...','\u274c \u0627\u0646\u0638\u0631 \u0627\u0644\u062a\u0631\u062a\u064a\u0628...');
    // Designed trap: show correct order briefly (learning from failure)
    g.sl=g.ay.w.slice();g.r();
    setTimeout(function(){g.sl=[];g.sh=shuf(g.ay.w.slice());g.st=Date.now();g.r();},2000);
  }
}

function renderAdv(){

  AY.forEach(function(ay,idx){
    var st=adv[ay.n]||{l:0,u:0,q:0};var dn=st.l&&st.u&&st.q;

function oAdv(n){
